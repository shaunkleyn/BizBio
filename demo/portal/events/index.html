            // Filters
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');

            const categories = ['All', ...new Set(allMenuItems.map(item => item.category))];

            const getRecurringEventOccurrences = (event, year, month) => {
                if (!event.isRecurring) return [event.startDate];
                
                const occurrences = [];
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const interval = event.recurrence.interval || 1;
                
                if (event.recurrence.frequency === 'weekly') {
                    // Get the start date of the recurring event
                    const eventStart = new Date(event.startDate);
                    const firstOccurrence = new Date(year, month, 1);
                    
                    // Find the first day of the month that matches a selected weekday
                    for (let day = 1; day <= daysInMonth; day++) {
                        const date = new Date(year, month, day);
                        const dayOfWeek = date.getDay();
                        
                        if (event.recurrence.weeklyDays.includes(dayOfWeek)) {
                            // Calculate weeks difference from event start
                            const weeksDiff = Math.floor((date - eventStart) / (7 * 24 * 60 * 60 * 1000));
                            
                            // Check if this occurrence falls on the interval (every 1st, 2nd, 3rd week, etc.)
                            if (weeksDiff >= 0 && weeksDiff % interval === 0) {
                                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                occurrences.push(dateStr);
                            }
                        }
                    }
                } else if (event.recurrence.frequency === 'monthly') {
                    const { monthlyType, monthlyDay } = event.recurrence;
                    
                    if (monthlyType === 'last') {
                        for (let day = daysInMonth; day >= 1; day--) {
                            const date = new Date(year, month, day);
                            if (date.getDay() === monthlyDay) {
                                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                occurrences.push(dateStr);
                                break;
                            }
                        }
                    } else {
                        const weekMap = { first: 0, second: 1, third: 2, fourth: 3 };
                        const weekNumber = weekMap[monthlyType];
                        let count = 0;
                        
                        for (let day = 1; day <= daysInMonth; day++) {
                            const date = new Date(year, month, day);
                            if (date.getDay() === monthlyDay) {
                                if (count === weekNumber) {
                                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                    occurrences.push(dateStr);
                                    
                                    if (event.endDate && event.endDate !== event.startDate) {
                                        const startD = new Date(event.startDate);
                                        const endD = new Date(event.endDate);
                                        const daysDiff = Math.floor((endD - startD) / (1000 * 60 * 60 * 24));
                                        
                                        for (let i = 1; i <= daysDiff; i++) {
                                            const nextDay = day + i;
                                            if (nextDay <= daysInMonth) {
                                                const nextDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(nextDay).padStart(2, '0')}`;
                                                occurrences.push(nextDateStr);
                                            }
                                        }
                                    }
                                    break;
                                }
                                count++;
                            }
                        }
                    }
                }
                
                return occurrences;
            };

            const getDaysInMonth = (date) => {
                const year = date.getFullYear();
                const month = date.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startingDayOfWeek = firstDay.getDay();
                
                const days = [];
                for (let i = 0; i < startingDayOfWeek; i++) {
                    days.push({ date: null, isCurrentMonth: false });
                }
                
                for (let i = 1; i <= daysInMonth; i++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    
                    const eventsOnDay = scheduledEvents.filter(e => {
                        if (e.isRecurring) {
                            const occurrences = getRecurringEventOccurrences(e, year, month);
                            return occurrences.includes(dateStr);
                        }
                        return e.startDate === dateStr;
                    });
                    
                    days.push({ 
                        date: i, dateStr, isCurrentMonth: true, events: eventsOnDay,
                        isToday: dateStr === new Date().toISOString().split('T')[0]
                    });
                }
                return days;
            };

            const changeMonth = (direction) => {

            };

            const changeWeek = (direction) => {
                const newWeek = new Date(currentWeekStart);
                newWeek.setDate(currentWeekStart.getDate() + (direction * 7));
                setCurrentWeekStart(newWeek);
            };

            const changeDay = (direction) => {

                const today = new Date();

                setCurrentDay(today);
                // Set to start of week (Sunday)

                const weekStart = new Date(today);
                weekStart.setDate(today.getDate() - dayOfWeek);
                setCurrentWeekStart(weekStart);
            };

            const getWeekDays = (startDate) => {
                const days = [];
                for (let i = 0; i < 7; i++) {
                    const date = new Date(startDate);
                    date.setDate(startDate.getDate() + i);
                    const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                    
                    const eventsOnDay = scheduledEvents.filter(e => {

                        }

                    });
                }
                return days;

                const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                
                return scheduledEvents.filter(e => {
                    if (e.isRecurring) {
                        const occurrences = getRecurringEventOccurrences(e, date.getFullYear(), date.getMonth());
                        return occurrences.includes(dateStr);
                    }
                    return e.startDate === dateStr;
                }).sort((a, b) => {
                    if (!a.startTime || !b.startTime) return 0;
                    return a.startTime.localeCompare(b.startTime);
                });
            };

                if (!event.startTime || !event.endTime) return null;
                
                const [startHour, startMin] = event.startTime.split(':').map(Number);
                const [endHour, endMin] = event.endTime.split(':').map(Number);
                
                const startMinutes = startHour * 60 + startMin;
                const endMinutes = endHour * 60 + endMin;
                const duration = endMinutes - startMinutes;

                    {/* MENU EDITOR MODAL */}
                    {showMenuEditorModal && (
                        <div className="nested-modal-overlay fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-[90vh] flex flex-col">
                                {/* Modal Header */}
                                <div className="px-6 py-4 border-b border-gray-200">
                                    <h3 className="text-lg font-semibold text-gray-900">
                                        {editingMenuVersion ? 'Edit Menu Version' : 'Create Menu Version'}
                                    </h3>
                                </div>

                                {/* Modal Body - Scrollable */}
                                <div className="flex-1 overflow-y-auto px-6 py-4">
                                    <div className="space-y-4">
                                        {/* Menu Version Details */}
                                        <div className="grid grid-cols-1 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Version Name *</label>
                                                <input
                                                    type="text"
                                                    value={menuVersionForm.name}
                                                    onChange={(e) => setMenuVersionForm({ ...menuVersionForm, name: e.target.value })}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
                                                    placeholder="e.g., Wedding Package"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Description</label>
                                                <input
                                                    type="text"
                                                    value={menuVersionForm.description}
                                                    onChange={(e) => setMenuVersionForm({ ...menuVersionForm, description: e.target.value })}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
                                                    placeholder="Brief description of this menu"
                                                />
                                            </div>
                                        </div>

                                        {/* Item Counter & Bulk Actions */}
                                        <div className="bg-indigo-50 rounded-lg p-4">
                                            <div className="flex items-center justify-between mb-3">
                                                <div className="flex-1">
                                                    <div className="flex items-center justify-between mb-2">
                                                        <span className="text-sm font-medium text-gray-700">Items Selected</span>
                                                        <span className="text-lg font-bold text-indigo-600">{selectedItemsCount} / {totalItemsCount}</span>
                                                    </div>
                                                    <div className="w-full bg-gray-200 rounded-full h-2">
                                                        <div
                                                            className="bg-indigo-600 h-2 rounded-full transition-all"
                                                            style={{ width: `${(selectedItemsCount / totalItemsCount) * 100}%` }}
                                                        />
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button
                                                    onClick={selectAllItems}
                                                    className="flex-1 px-3 py-1.5 text-sm font-medium text-indigo-700 bg-white rounded-md hover:bg-indigo-100"
                                                >
                                                    Select All
                                                </button>
                                                <button
                                                    onClick={selectNoneItems}
                                                    className="flex-1 px-3 py-1.5 text-sm font-medium text-indigo-700 bg-white rounded-md hover:bg-indigo-100"
                                                >
                                                    Select None
                                                </button>
                                                <button
                                                    onClick={inverseSelection}
                                                    className="flex-1 px-3 py-1.5 text-sm font-medium text-indigo-700 bg-white rounded-md hover:bg-indigo-100"
                                                >
                                                    Inverse
                                                </button>
                                            </div>
                                        </div>

                                        {/* Search and Filter */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <input
                                                    type="text"
                                                    value={searchQuery}
                                                    onChange={(e) => setSearchQuery(e.target.value)}
                                                    placeholder="Search items..."
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
                                                />
                                            </div>
                                            <div>
                                                <select
                                                    value={selectedCategory}
                                                    onChange={(e) => setSelectedCategory(e.target.value)}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
                                                >
                                                    {categories.map(cat => (
                                                        <option key={cat} value={cat}>{cat}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>

                                        {/* Menu Items List */}
                                        <div className="space-y-2">
                                            {filteredMenuItems.map(item => {
                                                const itemConfig = menuVersionForm.items.find(i => i.itemId === item.id);
                                                const isSelected = !!itemConfig;
                                                const isExpanded = expandedItem === item.id;
                                                
                                                return (
                                                    <div key={item.id} className="border border-gray-200 rounded-lg">
                                                        <div className={`p-4 ${isSelected ? 'bg-indigo-50' : 'bg-white'}`}>
                                                            <div className="flex items-start">
                                                                <input
                                                                    type="checkbox"
                                                                    checked={isSelected}
                                                                    onChange={() => toggleItemInMenuVersion(item.id)}
                                                                    className="mt-1 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
                                                                />
                                                                <div className="ml-3 flex-1">
                                                                    <div className="flex items-center justify-between">
                                                                        <div className="flex-1">
                                                                            <div className="flex items-center gap-2">
                                                                                <span className="text-sm font-medium text-gray-900">{item.name}</span>
                                                                                <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800">
                                                                                    {item.category}
                                                                                </span>
                                                                            </div>
                                                                            <div className="text-sm text-gray-600 mt-1">R{item.basePrice}</div>
                                                                        </div>
                                                                        {isSelected && (item.portions.length > 0 || item.addons.length > 0) && (
                                                                            <button
                                                                                onClick={() => setExpandedItem(isExpanded ? null : item.id)}
                                                                                className="ml-2 px-3 py-1 text-xs font-medium text-indigo-600 bg-indigo-100 rounded-md hover:bg-indigo-200"
                                                                            >
                                                                                {isExpanded ? 'Hide' : 'Configure'}
                                                                            </button>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            </div>

                                                            {/* Expanded Options */}
                                                            {isSelected && isExpanded && (
                                                                <div className="mt-4 pl-7 space-y-4">
                                                                    {/* Portions */}
                                                                    {item.portions.length > 0 && (
                                                                        <div>
                                                                            <div className="text-xs font-semibold text-gray-700 mb-2">Available Portions:</div>
                                                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                                                                                {item.portions.map(portion => (
                                                                                    <label key={portion.id} className="flex items-center">
                                                                                        <input
                                                                                            type="checkbox"
                                                                                            checked={itemConfig.portions.includes(portion.id)}
                                                                                            onChange={() => togglePortionInItem(item.id, portion.id)}
                                                                                            className="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
                                                                                        />
                                                                                        <span className="ml-2 text-xs text-gray-700">
                                                                                            {portion.name} - R{portion.price}
                                                                                        </span>
                                                                                    </label>
                                                                                ))}
                                                                            </div>
                                                                        </div>
                                                                    )}

                                                                    {/* Add-ons */}
                                                                    {item.addons.length > 0 && (
                                                                        <div>
                                                                            <div className="text-xs font-semibold text-gray-700 mb-2">Available Add-ons:</div>
                                                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                                                                                {item.addons.map(addon => (
                                                                                    <label key={addon.id} className="flex items-center">
                                                                                        <input
                                                                                            type="checkbox"
                                                                                            checked={itemConfig.addons.includes(addon.id)}
                                                                                            onChange={() => toggleAddonInItem(item.id, addon.id)}
                                                                                            className="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
                                                                                        />
                                                                                        <span className="ml-2 text-xs text-gray-700">
                                                                                            {addon.name} {addon.price > 0 && `+R${addon.price}`}
                                                                                        </span>
                                                                                    </label>
                                                                                ))}
                                                                            </div>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>

                                {/* Modal Footer - Sticky */}
                                <div className="sticky-footer px-6 py-4">
                                    <div className="flex items-center justify-end space-x-3">
                                        <button
                                            onClick={() => {
                                                setShowMenuEditorModal(false);
                                                setIsCreatingFromEvent(false);
                                            }}
                                            className="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
                                        >
                                            Cancel
                                        </button>
                                        <button
                                            onClick={handleSaveMenuVersion}
                                            disabled={!menuVersionForm.name || menuVersionForm.items.length === 0}
                                            className="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:opacity-50"
                                        >
                                            {editingMenuVersion ? 'Update Version' : (isCreatingFromEvent ? 'Create & Use This Menu' : 'Create Version')}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MENU PREVIEW MODAL */}
                    {showMenuPreviewModal && previewMenuVersionId && (
                        <div className="menu-preview-modal fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
                                {/* Modal Header */}
                                <div className="px-6 py-4 border-b border-gray-200">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <h3 className="text-lg font-semibold text-gray-900">
                                                {getMenuVersion(previewMenuVersionId)?.name}
                                            </h3>
                                            {getMenuVersion(previewMenuVersionId)?.description && (
                                                <p className="text-sm text-gray-600 mt-1">
                                                    {getMenuVersion(previewMenuVersionId)?.description}
                                                </p>
                                            )}
                                        </div>
                                        <button
                                            onClick={() => setShowMenuPreviewModal(false)}
                                            className="text-gray-400 hover:text-gray-500"
                                        >
                                            <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>

                                {/* Modal Body - Scrollable */}
                                <div className="flex-1 overflow-y-auto px-6 py-4">
                                    <div className="space-y-6">
                                        {categories.filter(cat => cat !== 'All').map(category => {
                                            const categoryItems = getMenuVersion(previewMenuVersionId)?.items
                                                .map(itemConfig => {
                                                    const item = allMenuItems.find(i => i.id === itemConfig.itemId);
                                                    return item?.category === category ? { ...item, config: itemConfig } : null;
                                                })
                                                .filter(Boolean);

                                            if (!categoryItems || categoryItems.length === 0) return null;

                                            return (
                                                <div key={category}>
                                                    <h4 className="text-md font-semibold text-gray-900 mb-3 pb-2 border-b border-gray-200">
                                                        {category}
                                                    </h4>
                                                    <div className="space-y-3">
                                                        {categoryItems.map(item => (
                                                            <div key={item.id} className="border border-gray-200 rounded-lg p-3">
                                                                <div className="flex justify-between items-start mb-2">
                                                                    <div className="font-medium text-gray-900">{item.name}</div>
                                                                    <div className="text-gray-700 font-semibold">R{item.basePrice}</div>
                                                                </div>
                                                                
                                                                {item.portions.length > 0 && item.config.portions.length > 0 && (
                                                                    <div className="mt-2">
                                                                        <div className="text-xs font-medium text-gray-600 mb-1">Sizes:</div>
                                                                        <div className="flex flex-wrap gap-1">
                                                                            {item.portions
                                                                                .filter(p => item.config.portions.includes(p.id))
                                                                                .map(portion => (
                                                                                    <span key={portion.id} className="inline-flex items-center px-2 py-1 rounded text-xs bg-gray-100 text-gray-700">
                                                                                        {portion.name} - R{portion.price}
                                                                                    </span>
                                                                                ))}
                                                                        </div>
                                                                    </div>
                                                                )}
                                                                
                                                                {item.addons.length > 0 && item.config.addons.length > 0 && (
                                                                    <div className="mt-2">
                                                                        <div className="text-xs font-medium text-gray-600 mb-1">Add-ons:</div>
                                                                        <div className="flex flex-wrap gap-1">
                                                                            {item.addons
                                                                                .filter(a => item.config.addons.includes(a.id))
                                                                                .map(addon => (
                                                                                    <span key={addon.id} className="inline-flex items-center px-2 py-1 rounded text-xs bg-indigo-50 text-indigo-700">
                                                                                        {addon.name} {addon.price > 0 && `+R${addon.price}`}
                                                                                    </span>
                                                                                ))}
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Modal Footer - Sticky */}
                                <div className="sticky-footer px-6 py-4">
                                    <div className="flex items-center justify-end">
                                        <button
                                            onClick={() => setShowMenuPreviewModal(false)}
                                            className="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700"
                                        >
                                            Close
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<MenuSchedulingDashboard />, document.getElementById('root'));
    </script>
</body>
</html>
