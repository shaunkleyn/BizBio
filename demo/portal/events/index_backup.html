        function MenuSchedulingDashboard() {
            const [currentScreen, setCurrentScreen] = useState('calendar');

            // Modals

            const [editingEvent, setEditingEvent] = useState(null);
            const [editingMenuVersion, setEditingMenuVersion] = useState(null);
            const [expandedItem, setExpandedItem] = useState(null);
            const [isCreatingFromEvent, setIsCreatingFromEvent] = useState(false);
            
            // Forms
            const [eventForm, setEventForm] = useState({
                name: '', menuVersionId: '', startDate: '', endDate: '',
                startTime: '', endTime: '', notes: '', allDay: false,
                isRecurring: false,
                recurrence: {
                    frequency: 'weekly',
                    weeklyDays: [],
                    monthlyType: 'first',
                    monthlyDay: 0,
                    endsType: 'never',
                    endsAfter: 10,
                    endsOn: ''
                }
            });
            
            const [menuVersionForm, setMenuVersionForm] = useState({
                name: '', description: '', items: []
            });
            
            // Filters
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');

            const categories = ['All', ...new Set(allMenuItems.map(item => item.category))];

            // Helper: Get all occurrences of recurring events in current month
            const getRecurringEventOccurrences = (event, year, month) => {
                if (!event.isRecurring) return [event.startDate];
                
                const occurrences = [];
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                
                if (event.recurrence.frequency === 'weekly') {
                    for (let day = 1; day <= daysInMonth; day++) {
                        const date = new Date(year, month, day);
                        const dayOfWeek = date.getDay();
                        
                        if (event.recurrence.weeklyDays.includes(dayOfWeek)) {
                            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                            occurrences.push(dateStr);
                        }
                    }
                } else if (event.recurrence.frequency === 'monthly') {
                    const { monthlyType, monthlyDay } = event.recurrence;
                    
                    if (monthlyType === 'last') {
                        // Find last occurrence of day in month
                        for (let day = daysInMonth; day >= 1; day--) {
                            const date = new Date(year, month, day);
                            if (date.getDay() === monthlyDay) {
                                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                occurrences.push(dateStr);
                                break;
                            }
                        }
                    } else {
                        // Find first/second/third/fourth occurrence
                        const weekMap = { first: 0, second: 1, third: 2, fourth: 3 };
                        const weekNumber = weekMap[monthlyType];
                        let count = 0;
                        
                        for (let day = 1; day <= daysInMonth; day++) {
                            const date = new Date(year, month, day);
                            if (date.getDay() === monthlyDay) {
                                if (count === weekNumber) {
                                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                    occurrences.push(dateStr);
                                    
                                    // For multi-day events (like weekend)
                                    if (event.endDate && event.endDate !== event.startDate) {
                                        const startD = new Date(event.startDate);
                                        const endD = new Date(event.endDate);
                                        const daysDiff = Math.floor((endD - startD) / (1000 * 60 * 60 * 24));
                                        
                                        for (let i = 1; i <= daysDiff; i++) {
                                            const nextDay = day + i;
                                            if (nextDay <= daysInMonth) {
                                                const nextDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(nextDay).padStart(2, '0')}`;
                                                occurrences.push(nextDateStr);
                                            }
                                        }
                                    }
                                    break;
                                }
                                count++;
                            }
                        }
                    }
                }
                
                return occurrences;
            };

            const getDaysInMonth = (date) => {
                const year = date.getFullYear();
                const month = date.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startingDayOfWeek = firstDay.getDay();
                
                const days = [];
                for (let i = 0; i < startingDayOfWeek; i++) {
                    days.push({ date: null, isCurrentMonth: false });
                }
                
                for (let i = 1; i <= daysInMonth; i++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    
                    // Get all events for this day (including recurring)
                    const eventsOnDay = scheduledEvents.filter(e => {
                        if (e.isRecurring) {
                            const occurrences = getRecurringEventOccurrences(e, year, month);
                            return occurrences.includes(dateStr);
                        }
                        return e.startDate === dateStr;
                    });
                    
                    days.push({ 
                        date: i, dateStr, isCurrentMonth: true, events: eventsOnDay,
                        isToday: dateStr === new Date().toISOString().split('T')[0]
                    });
                }
                return days;
            };

                    return;

            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

                               'July', 'August', 'September', 'October', 'November', 'December'];

            const getRecurrenceDescription = (event) => {
                if (!event.isRecurring || !event.recurrence) return '';
                
                const { frequency, weeklyDays, monthlyType, monthlyDay } = event.recurrence;

                                            <button
                                                onClick={() => handleDeleteEvent(editingEvent.id)}
                                                className="px-4 py-2 text-sm font-medium text-red-600 bg-white border border-red-300 rounded-md hover:bg-red-50"
                                            >
                                                Delete Event
                                            </button>
                                        )}
                                        <div className={`flex items-center space-x-3 ${!editingEvent ? 'ml-auto' : ''}`}>
                                            <button
                                                onClick={() => setShowEventModal(false)}
                                                className="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
                                            >
                                                Cancel
                                            </button>
                                            <button
                                                onClick={handleSaveEvent}
                                                disabled={!eventForm.name || !eventForm.menuVersionId || !eventForm.startDate}
                                                className="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:opacity-50"
                                            >
                                                {editingEvent ? 'Update Event' : 'Schedule Event'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MENU EDITOR MODAL */}
                    {showMenuEditorModal && (
                        <div className="nested-modal-overlay fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-[90vh] flex flex-col">
                                {/* Modal Header */}
                                <div className="px-6 py-4 border-b border-gray-200">
                                    <h3 className="text-lg font-semibold text-gray-900">
                                        {editingMenuVersion ? 'Edit Menu Version' : 'Create Menu Version'}
                                    </h3>
                                </div>

                                {/* Modal Body - Scrollable */}
                                <div className="flex-1 overflow-y-auto px-6 py-4">
                                    <div className="space-y-4">
                                        {/* Menu Version Details */}
                                        <div className="grid grid-cols-1 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Version Name *</label>
                                                <input
                                                    type="text"
                                                    value={menuVersionForm.name}
                                                    onChange={(e) => setMenuVersionForm({ ...menuVersionForm, name: e.target.value })}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
                                                    placeholder="e.g., Wedding Package"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Description</label>
                                                <input
                                                    type="text"
                                                    value={menuVersionForm.description}
                                                    onChange={(e) => setMenuVersionForm({ ...menuVersionForm, description: e.target.value })}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
                                                    placeholder="Brief description of this menu"
                                                />
                                            </div>
                                        </div>

                                        {/* Item Counter */}
                                        <div className="bg-indigo-50 rounded-lg p-4">
                                            <div className="flex items-center justify-between mb-2">
                                                <span className="text-sm font-medium text-gray-700">Items Selected</span>
                                                <span className="text-lg font-bold text-indigo-600">{selectedItemsCount} / {totalItemsCount}</span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-2">
                                                <div
                                                    className="bg-indigo-600 h-2 rounded-full transition-all"
                                                    style={{ width: `${(selectedItemsCount / totalItemsCount) * 100}%` }}
                                                />
                                            </div>
                                        </div>

                                        {/* Search and Filter */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <input
                                                    type="text"
                                                    value={searchQuery}
                                                    onChange={(e) => setSearchQuery(e.target.value)}
                                                    placeholder="Search items..."
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
                                                />
                                            </div>
                                            <div>
                                                <select
                                                    value={selectedCategory}
                                                    onChange={(e) => setSelectedCategory(e.target.value)}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
                                                >
                                                    {categories.map(cat => (
                                                        <option key={cat} value={cat}>{cat}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>

                                        {/* Menu Items List */}
                                        <div className="space-y-2">
                                            {filteredMenuItems.map(item => {
                                                const itemConfig = menuVersionForm.items.find(i => i.itemId === item.id);
                                                const isSelected = !!itemConfig;
                                                const isExpanded = expandedItem === item.id;
                                                
                                                return (
                                                    <div key={item.id} className="border border-gray-200 rounded-lg">
                                                        <div className={`p-4 ${isSelected ? 'bg-indigo-50' : 'bg-white'}`}>
                                                            <div className="flex items-start">
                                                                <input
                                                                    type="checkbox"
                                                                    checked={isSelected}
                                                                    onChange={() => toggleItemInMenuVersion(item.id)}
                                                                    className="mt-1 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
                                                                />
                                                                <div className="ml-3 flex-1">
                                                                    <div className="flex items-center justify-between">
                                                                        <div className="flex-1">
                                                                            <div className="flex items-center gap-2">
                                                                                <span className="text-sm font-medium text-gray-900">{item.name}</span>
                                                                                <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800">
                                                                                    {item.category}
                                                                                </span>
                                                                            </div>
                                                                            <div className="text-sm text-gray-600 mt-1">R{item.basePrice}</div>
                                                                        </div>
                                                                        {isSelected && (item.portions.length > 0 || item.addons.length > 0) && (
                                                                            <button
                                                                                onClick={() => setExpandedItem(isExpanded ? null : item.id)}
                                                                                className="ml-2 px-3 py-1 text-xs font-medium text-indigo-600 bg-indigo-100 rounded-md hover:bg-indigo-200"
                                                                            >
                                                                                {isExpanded ? 'Hide' : 'Configure'}
                                                                            </button>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            </div>

                                                            {/* Expanded Options */}
                                                            {isSelected && isExpanded && (
                                                                <div className="mt-4 pl-7 space-y-4">
                                                                    {/* Portions */}
                                                                    {item.portions.length > 0 && (
                                                                        <div>
                                                                            <div className="text-xs font-semibold text-gray-700 mb-2">Available Portions:</div>
                                                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                                                                                {item.portions.map(portion => (
                                                                                    <label key={portion.id} className="flex items-center">
                                                                                        <input
                                                                                            type="checkbox"
                                                                                            checked={itemConfig.portions.includes(portion.id)}
                                                                                            onChange={() => togglePortionInItem(item.id, portion.id)}
                                                                                            className="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
                                                                                        />
                                                                                        <span className="ml-2 text-xs text-gray-700">
                                                                                            {portion.name} - R{portion.price}
                                                                                        </span>
                                                                                    </label>
                                                                                ))}
                                                                            </div>
                                                                        </div>
                                                                    )}

                                                                    {/* Add-ons */}
                                                                    {item.addons.length > 0 && (
                                                                        <div>
                                                                            <div className="text-xs font-semibold text-gray-700 mb-2">Available Add-ons:</div>
                                                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                                                                                {item.addons.map(addon => (
                                                                                    <label key={addon.id} className="flex items-center">
                                                                                        <input
                                                                                            type="checkbox"
                                                                                            checked={itemConfig.addons.includes(addon.id)}
                                                                                            onChange={() => toggleAddonInItem(item.id, addon.id)}
                                                                                            className="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
                                                                                        />
                                                                                        <span className="ml-2 text-xs text-gray-700">
                                                                                            {addon.name} {addon.price > 0 && `+R${addon.price}`}
                                                                                        </span>
                                                                                    </label>
                                                                                ))}
                                                                            </div>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>

                                {/* Modal Footer - Sticky */}
                                <div className="sticky-footer px-6 py-4">
                                    <div className="flex items-center justify-end space-x-3">
                                        <button
                                            onClick={() => {
                                                setShowMenuEditorModal(false);
                                                setIsCreatingFromEvent(false);
                                            }}
                                            className="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
                                        >
                                            Cancel
                                        </button>
                                        <button
                                            onClick={handleSaveMenuVersion}
                                            disabled={!menuVersionForm.name || menuVersionForm.items.length === 0}
                                            className="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:opacity-50"
                                        >
                                            {editingMenuVersion ? 'Update Version' : (isCreatingFromEvent ? 'Create & Use This Menu' : 'Create Version')}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<MenuSchedulingDashboard />, document.getElementById('root'));
    </script>
</body>
</html>
