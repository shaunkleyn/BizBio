<body class="bg-[#f0f4f8]">
    <!-- Main container for the profile card -->
    <div class="relative top-4 w-full max-w-sm mx-auto overflow-hidden bg-white shadow-xl rounded-3xl md:max-w-md lg:max-w-lg">
        <!-- Top section with blue background -->
        <div class="bg-[#3b0d99] p-6 pb-32 rounded-b-3xl text-white">

<div style="
    width: 40vw;
    height: 40vw;
    position: absolute;
    background: #d2d2d2;
    border-radius: 50%;
    left: 25vw;
    top: -18vw;
    opacity: 0.07;
    overflow: hidden;
"></div>
            <!-- Header section with back button and title -->
            <div class="flex items-center justify-between mb-8">
                <a href="#" class="text-xl">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 class="text-lg font-medium">Details</h1>
                <div class="w-6"></div> <!-- Spacer to center title -->
            </div>
            <!-- Profile image, name, and title -->
            <div class="flex flex-col items-center text-center">
                <!-- Profile image with border -->
                <div class="relative w-24 h-24 mb-4">
                    <img src="https://placehold.co/96x96/6A0DAD/ffffff?text=JW" alt="Jenny Wilson" class="w-full h-full rounded-full border-4 border-white object-cover">
                </div>
                <h2 class="text-2xl font-bold">Jenny Wilson</h2>
                <p class="text-sm font-light opacity-80">Sr. UI/UX Designer</p>
            </div>
        </div>

        <!-- Contact action buttons section -->
        <div class="absolute inset-x-0 top-48 pt-16 mx-auto w-11/12">
            <div class="grid grid-cols-4 gap-4 pt-4 bg-white-400 rounded-2xl shadow-lg">
                <!-- Email button -->
                <button class="flex flex-col items-center rounded-xl border border-white/50">
                    <div class=" rounded-full p-1 text-white/60">
                        <i class="fas fa-envelope text-lg"></i>
                    </div>
                    <span class="text-xs text-white/60 mb-2">Email</span>
                </button>
                <!-- Call button -->
                <button class="flex flex-col items-center rounded-xl border border-white/50">
                    <div class=" rounded-full p-1 text-white/60">
                        <i class="fas fa-phone-alt text-lg"></i>
                    </div>
                    <span class="text-xs text-white/60">Call</span>
                </button>
                <!-- Whatsapp button -->
                <button class="flex flex-col items-center rounded-xl border border-white/50">
                    <div class=" rounded-full p-1 text-white/60">
                        <i class="fab fa-whatsapp text-lg"></i>
                    </div>
                    <span class="text-xs text-white/60">Whatsapp</span>
                </button>
                <!-- Favorite button -->
                <button class="flex flex-col items-center rounded-xl border border-white/50">
                    <div class=" rounded-full p-1 text-white/60">
                        <i class="far fa-star text-lg"></i>
                    </div>
                    <span class="text-xs text-white/60">Favorite</span>
                </button>
            </div>
        </div>

        <!-- Details section (below the action buttons) -->
        <div class="pt-0 px-6">
            <!-- Email section -->
            <div class="flex items-start border-b border-gray-200 pb-4">
                <div class="p-2 bg-purple-100 rounded-full text-purple-700 mr-4">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="flex-grow">
                    <p class="text-sm font-semibold text-gray-800">Email</p>
                    <p class="text-sm text-gray-600">Official</p>
                    <a href="mailto:michael.mitc@example.com" class="block text-sm text-gray-600 font-medium">michael.mitc@example.com</a>
                    <p class="text-sm text-gray-600 mt-2">Personal</p>
                    <a href="mailto:michael@example.com" class="block text-sm text-gray-600 font-medium">michael@example.com</a>
                </div>
            </div>

            <!-- Phone number section -->
            <div class="flex items-center border-b border-gray-200 pb-4">
                <div class="p-2 bg-purple-100 rounded-full text-purple-700 mr-4">
                    <i class="fas fa-phone-alt"></i>
                </div>
                <div>
                    <p class="text-sm font-semibold text-gray-800">Phone number</p>
                    <p class="text-sm text-gray-600">Mobile</p>
                    <p class="text-sm font-medium text-gray-800">(209) 555-0104</p>
                </div>
            </div>

            <!-- Team section -->
            <div class="flex items-center justify-between border-b border-gray-200 pb-4">
                <div class="flex items-center">
                    <div class="p-2 bg-purple-100 rounded-full text-purple-700 mr-4">
                        <i class="fas fa-users"></i>
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-gray-800">Team</p>
                        <p class="text-sm font-medium text-gray-800">Project Operation Team</p>
                    </div>
                </div>
                <i class="fas fa-arrow-right text-gray-500 text-lg"></i>
            </div>

            <!-- Leads by section -->
            <div class="flex items-center justify-between border-b border-gray-200 pb-4">
                <div class="flex items-center">
                    <div class="p-2 bg-purple-100 rounded-full text-purple-700 mr-4">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-gray-800">Leads by</p>
                        <p class="text-sm font-medium text-gray-800">Darrell Steward</p>
                    </div>
                </div>
                <i class="fas fa-arrow-right text-gray-500 text-lg"></i>
            </div>
        </div>

        <!-- Bottom action bar -->
        <div class="sticky bottom-0 bg-white px-4 flex justify-between items-center shadow-lg rounded-t-3xl border-t border-gray-200">
            <button class="flex items-center text-purple-700 font-medium px-4 py-3 rounded-full hover:bg-purple-50 transition-colors duration-200">
                <i class="fas fa-user-plus mr-2"></i>
                Add to contact
            </button>
            <button class="p-3 bg-purple-700 text-white rounded-full shadow-lg hover:bg-purple-800 transition-colors duration-200">
                <i class="fas fa-share-alt"></i>
            </button>
        </div>
    </div>


</body></html>
