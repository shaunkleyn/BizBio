<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white w-full max-w-sm rounded-3xl shadow-xl overflow-hidden">
    
    <!-- Header -->
    <div class="bg-indigo-700 text-white relative p-6 text-center">
      <button class="absolute left-4 top-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
      <h2 class="text-lg font-medium">Details</h2>

      <!-- Avatar -->
      <div class="flex justify-center mt-4">
        <img src="https://i.ibb.co/2hJ4YqR/avatar.png" alt="avatar" class="w-20 h-20 rounded-full border-4 border-white shadow-md">
      </div>

      <!-- Name + Title -->
      <h3 class="text-xl font-semibold mt-3">Jenny Wilson</h3>
      <p class="text-sm opacity-80">Sr. UI/UX Designer</p>

      <!-- Action Buttons -->
      <div class="flex justify-center gap-3 mt-4">
        <button class="bg-white text-indigo-700 px-4 py-2 rounded-xl flex items-center gap-2 shadow">
          <span>Email</span>
        </button>
        <button class="bg-white text-indigo-700 px-4 py-2 rounded-xl flex items-center gap-2 shadow">
          <span>Call</span>
        </button>
        <button class="bg-white text-indigo-700 px-4 py-2 rounded-xl flex items-center gap-2 shadow">
          <span>Whatsapp</span>
        </button>
        <button class="bg-white text-indigo-700 px-4 py-2 rounded-xl flex items-center gap-2 shadow">
          <span>★</span>
        </button>
      </div>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-6">

      <!-- Email -->
      <div>
        <h4 class="text-sm font-semibold text-gray-600 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12H8m8-4H8m8 8H8m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          Email
        </h4>
        <p class="text-xs text-gray-400 mt-1">Official</p>
        <p class="text-sm">michael.mitc@example.com</p>
        <p class="text-xs text-gray-400 mt-2">Personal</p>
        <p class="text-sm">michael@example.com</p>
      </div>

      <!-- Phone -->
      <div>
        <h4 class="text-sm font-semibold text-gray-600 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h2l3.6 7.59a1 1 0 00.93.58H17a1 1 0 001-1V6a1 1 0 00-1-1h-1l-1.34-2.67A1 1 0 0013 2H6a1 1 0 00-1 1v2z" />
          </svg>
          Phone number
        </h4>
        <p class="text-sm">(209) 555-0104</p>
      </div>

      <!-- Team -->
      <div class="flex items-center justify-between">
        <div>
          <h4 class="text-sm font-semibold text-gray-600">Team</h4>
          <p class="text-sm text-gray-800">Project Operation Team</p>
        </div>
        <button class="bg-indigo-100 p-2 rounded-full text-indigo-700">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </button>
      </div>

      <!-- Leads By -->
      <div class="flex items-center justify-between">
        <div>
          <h4 class="text-sm font-semibold text-gray-600">Leads by</h4>
          <p class="text-sm text-gray-800">Darrell Steward</p>
        </div>
        <button class="bg-indigo-100 p-2 rounded-full text-indigo-700">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex justify-between border-t px-6 py-4">
      <button class="flex items-center gap-2 text-indigo-700 font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add to contact
      </button>
      <button class="text-indigo-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12v.01M12 20v-8m0-8v8m8 4v.01" />
        </svg>
      </button>
    </div>
  </div>

</body>
</html>
