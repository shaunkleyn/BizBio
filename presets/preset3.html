            padding-bottom: 0.5rem;

            border-bottom-color: #f43f5e; /* rose-500 */

<body class="bg-gradient-to-b from-blue-500 to-indigo-700 min-h-screen flex flex-col">

    <!-- Header Section -->
    <header class="p-4 text-white flex items-center">
        <a href="#" class="mr-4">
            <!-- Back Arrow SVG Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
        </a>
        <h1 class="text-xl font-semibold">Edit Profile</h1>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow flex flex-col items-center justify-center px-4">
        <div style="
    /* background: #e8f0f8; */
    width: 100%;
    top: 0;
    position: absolute;
    z-index: 0;
    left: 0;
    height: 40%;
" class="bg-gradient-to-b from-sky-600 to-indigo-800"></div>
<div style="
    background: #e8f0f8;
    width: 100%;
    top: 40%;
    position: absolute;
    z-index: 0;
    left: 0;
    height: 60%;
"></div><div class="w-full max-w-sm" style="
    z-index: 12;
">
            <!-- Profile Picture Section -->
            <div class="relative flex justify-center mb-[-6rem] z-10">
                <div class="relative">
                    <img class="h-48 w-48 rounded-full object-cover border-0 border-white shadow-md" src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&amp;w=1887&amp;auto=format&amp;fit=crop&amp;ixlib=rb-4.0.3&amp;ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Profile Picture" onerror="this.onerror=null;this.src='https://placehold.co/128x128/E0E0E0/FFFFFF?text=User';">
                    <!-- Edit Icon Button -->
                    <button class="absolute bottom-1 right-1 bg-pink-600 rounded-full p-2 hover:bg-pink-700 transition-colors">
                        <!-- Pencil SVG Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.5L16.732 3.732z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Profile Form Card -->
            <div class="bg-white rounded-lg shadow-xl p-6 pt-32 w-full" style="
    background: #eef1f9;
">
                <form action="#" method="POST">
                    <div class="space-y-6">
                        <!-- User Name Field -->
                        <div>
                            <label for="username" class="block text-xs font-medium text-gray-500">USER NAME</label>
                            <input type="text" name="username" id="username" value="Alice Wonderland" class="mt-1 block w-full form-input">
                        </div>

                        <!-- Full Name Field -->
                        <div>
                            <label for="fullname" class="block text-xs font-medium text-gray-500">FULL NAME</label>
                            <input type="text" name="fullname" id="fullname" value="Alice Cole" class="mt-1 block w-full form-input">
                        </div>

                        <!-- Email Field -->
                        <div>
                            <label for="email" class="block text-xs font-medium text-gray-500">E-MAIL</label>
                            <input type="email" name="email" id="email" value="aliceinwonderland@gmail.com" class="mt-1 block w-full form-input">
                        </div>

                        <!-- Password Field -->
                        <div>
                            <label for="password" class="block text-xs font-medium text-gray-500">PASSWORD</label>
                            <input type="password" name="password" id="password" value="••••••••" class="mt-1 block w-full form-input">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
    
    <!-- Footer/Action Button Section -->
    <footer class="p-4" style="
    z-index: 11;
">
         <div class="w-full max-w-sm mx-auto">
            <!-- Save Button -->
            <button type="submit" class="w-full bg-pink-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-pink-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pink-500 transition-all duration-300 shadow-lg">
                Save
            </button>
        </div>
    </footer>



</body></html>
