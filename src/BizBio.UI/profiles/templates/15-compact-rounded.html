<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amber Johnson - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/15.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 380px;
            width: 100%;
            background: #fff;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(252,182,159,0.4);
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 16px;
            border: 3px solid #fcb69f;
        }
        .header-info { flex: 1; }
        .name {
            font-size: 20px;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 4px;
        }
        .title {
            font-size: 13px;
            color: #f85032;
            font-weight: 600;
        }
        .company {
            font-size: 12px;
            color: #636e72;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }
        .action-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background: #fff5f0;
            border-radius: 50px;
            text-decoration: none;
            color: #f85032;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .action-pill:hover {
            background: #f85032;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(248,80,50,0.3);
        }
        .body {
            margin-bottom: 24px;
        }
        .info-list {
            margin-bottom: 24px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 14px;
            background: #fafafa;
            border-radius: 20px;
            margin-bottom: 10px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .info-item:hover {
            background: #fff5f0;
            transform: translateX(5px);
        }
        .info-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f85032, #e73827);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            color: #fff;
            font-size: 14px;
        }
        .info-text {
            flex: 1;
        }
        .info-label {
            font-size: 11px;
            color: #b2bec3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .info-value {
            font-size: 14px;
            color: #2d3436;
            font-weight: 600;
        }
        .social-row {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .social-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s;
        }
        .social-btn:hover { transform: translateY(-3px); }
        .btn-linkedin { background: #0077b5; color: #fff; }
        .btn-facebook { background: #1877f2; color: #fff; }
        .btn-instagram { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: #fff; }
        .btn-twitter { background: #000; color: #fff; }
        .footer {
            margin-top: 24px;
        }
        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            background: linear-gradient(135deg, #f85032, #e73827);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s;
        }
        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(248,80,50,0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="https://randomuser.me/api/portraits/women/63.jpg" alt="Amber Johnson" class="avatar">
            <div class="header-info">
                <h1 class="name">Amber Johnson</h1>
                <p class="title">Event Coordinator</p>
                <p class="company">Celebrate Events</p>
            </div>
        </div>

        <div class="action-buttons">
            <a href="tel:+27711234567" class="action-pill"><i class="fas fa-phone"></i> Call</a>
            <a href="mailto:amber@celebrateevents.co.za" class="action-pill"><i class="fas fa-envelope"></i> Email</a>
            <a href="https://wa.me/27711234567" class="action-pill"><i class="fab fa-whatsapp"></i> Chat</a>
            <a href="https://www.celebrateevents.co.za" class="action-pill"><i class="fas fa-globe"></i> Website</a>
        </div>

        <div class="body">
            <div class="info-list">
                <a href="tel:+27711234567" class="info-item">
                    <div class="info-icon"><i class="fas fa-phone"></i></div>
                    <div class="info-text">
                        <div class="info-label">Phone</div>
                        <div class="info-value">071 123 4567</div>
                    </div>
                </a>
                <a href="mailto:amber@celebrateevents.co.za" class="info-item">
                    <div class="info-icon"><i class="fas fa-envelope"></i></div>
                    <div class="info-text">
                        <div class="info-label">Email</div>
                        <div class="info-value">amber@celebrateevents.co.za</div>
                    </div>
                </a>
                <a href="https://maps.google.com/?q=Green+Point,+Cape+Town" class="info-item">
                    <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                    <div class="info-text">
                        <div class="info-label">Location</div>
                        <div class="info-value">Green Point, Cape Town</div>
                    </div>
                </a>
            </div>

            <div class="social-row">
                <a href="https://linkedin.com/in/amberjohnson" class="social-btn btn-linkedin"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://facebook.com/celebrateevents" class="social-btn btn-facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="https://instagram.com/celebrateevents" class="social-btn btn-instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://twitter.com/amberjohnson" class="social-btn btn-twitter"><i class="fab fa-x-twitter"></i></a>
            </div>
        </div>

        <div class="footer">
            <a href="amber_johnson.vcf" class="save-btn"><i class="fas fa-user-plus"></i> Save Contact</a>
        </div>
    </div>
    <script src="../vcard-generator.js"></script>
</body>
</html>
