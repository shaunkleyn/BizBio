<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily Wright - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito Sans', sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #e8f4fd 50%, #f0fff4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: #fff;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(180,160,200,0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 10px 30px rgba(180,160,200,0.3);
        }
        .avatar-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            border-radius: 50%;
            border: 3px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #7c3aed;
        }
        .name {
            font-size: 26px;
            font-weight: 800;
            color: #4a4a6a;
            margin-bottom: 6px;
        }
        .title {
            font-size: 14px;
            color: #a78bfa;
            font-weight: 700;
        }
        .company {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 4px;
        }
        .action-bubbles {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 28px;
        }
        .bubble {
            width: 56px;
            height: 56px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            font-size: 20px;
            transition: all 0.3s;
        }
        .bubble:hover {
            transform: translateY(-4px) rotate(5deg);
        }
        .bubble-call { background: linear-gradient(135deg, #a8edea, #86d9ca); }
        .bubble-email { background: linear-gradient(135deg, #fed6e3, #f9a8d4); }
        .bubble-whatsapp { background: linear-gradient(135deg, #86efac, #4ade80); }
        .bubble-web { background: linear-gradient(135deg, #c4b5fd, #a78bfa); }
        .info-cards {
            display: grid;
            gap: 12px;
            margin-bottom: 24px;
        }
        .info-card {
            display: flex;
            align-items: center;
            padding: 16px;
            background: linear-gradient(135deg, #fafafa, #f5f5f5);
            border-radius: 18px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .info-card:hover {
            transform: translateX(5px);
            background: linear-gradient(135deg, #f0f0ff, #fff0f5);
        }
        .info-emoji {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            font-size: 20px;
        }
        .emoji-phone { background: linear-gradient(135deg, #a8edea, #e8fff5); }
        .emoji-email { background: linear-gradient(135deg, #fed6e3, #fff5f8); }
        .emoji-web { background: linear-gradient(135deg, #c4b5fd, #f5f0ff); }
        .emoji-location { background: linear-gradient(135deg, #fde68a, #fffbeb); }
        .info-content { flex: 1; }
        .info-label {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }
        .info-value {
            font-size: 14px;
            color: #4a4a6a;
            font-weight: 700;
        }
        .social-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 2px dashed #f0f0f5;
        }
        .social-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: #f8f8fc;
            border-radius: 50px;
            text-decoration: none;
            color: #6b7280;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s;
        }
        .social-pill:hover {
            background: linear-gradient(135deg, #c4b5fd, #a78bfa);
            color: #fff;
        }
        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px;
            background: linear-gradient(135deg, #a78bfa, #c4b5fd, #fed6e3);
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 800;
            font-size: 15px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(167,139,250,0.3);
        }
        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(167,139,250,0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="avatar-wrapper">
                <img src="https://randomuser.me/api/portraits/women/17.jpg" alt="Emily Wright" class="avatar">
                <div class="avatar-badge"><i class="fas fa-check"></i></div>
            </div>
            <h1 class="name">Emily Wright</h1>
            <p class="title">Interior Designer</p>
            <p class="company">Blush Design Studio</p>
        </div>

        <div class="action-bubbles">
            <a href="tel:+27317654321" class="bubble bubble-call"><i class="fas fa-phone"></i></a>
            <a href="mailto:emily@blushdesign.co.za" class="bubble bubble-email"><i class="fas fa-envelope"></i></a>
            <a href="https://wa.me/27837654321" class="bubble bubble-whatsapp"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.blushdesign.co.za" class="bubble bubble-web"><i class="fas fa-globe"></i></a>
        </div>

        <div class="info-cards">
            <a href="tel:+27317654321" class="info-card">
                <div class="info-emoji emoji-phone">📱</div>
                <div class="info-content">
                    <div class="info-label">Phone</div>
                    <div class="info-value">031 765 4321</div>
                </div>
            </a>
            <a href="mailto:emily@blushdesign.co.za" class="info-card">
                <div class="info-emoji emoji-email">💌</div>
                <div class="info-content">
                    <div class="info-label">Email</div>
                    <div class="info-value">emily@blushdesign.co.za</div>
                </div>
            </a>
            <a href="https://www.blushdesign.co.za" class="info-card">
                <div class="info-emoji emoji-web">🌐</div>
                <div class="info-content">
                    <div class="info-label">Website</div>
                    <div class="info-value">blushdesign.co.za</div>
                </div>
            </a>
            <a href="https://maps.google.com/?q=Ballito,+KwaZulu-Natal" class="info-card">
                <div class="info-emoji emoji-location">📍</div>
                <div class="info-content">
                    <div class="info-label">Location</div>
                    <div class="info-value">Ballito, KZN</div>
                </div>
            </a>
        </div>

        <div class="social-row">
            <a href="https://linkedin.com/in/emilywright" class="social-pill"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
            <a href="https://instagram.com/blushdesignstudio" class="social-pill"><i class="fab fa-instagram"></i> Instagram</a>
        </div>

        <a href="emily_wright.vcf" class="save-btn"><i class="fas fa-heart"></i> Save Contact</a>
    </div>
    <script src="../vcard-generator.js"></script>
</body>
</html>
