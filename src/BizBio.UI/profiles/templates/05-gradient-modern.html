<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya Sharma - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 400px;
            width: 100%;
        }
        .main-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(102,126,234,0.3);
            margin-bottom: 20px;
        }
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 10px 40px rgba(102,126,234,0.4);
        }
        .status-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #00c851, #28a745);
            border-radius: 50%;
            border: 3px solid #fff;
        }
        .name {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .title {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .company {
            font-size: 14px;
            color: #666;
        }
        .bio {
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(240,147,251,0.1));
            border-radius: 16px;
            font-size: 14px;
            color: #444;
            line-height: 1.6;
        }
        .actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 28px;
        }
        .action-btn {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            font-size: 20px;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .action-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.2); }
        .btn-call { background: linear-gradient(135deg, #00c851, #28a745); }
        .btn-email { background: linear-gradient(135deg, #667eea, #764ba2); }
        .btn-whatsapp { background: linear-gradient(135deg, #25d366, #128c7e); }
        .btn-web { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .info-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(102,126,234,0.2);
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-item:last-child { border-bottom: none; }
        .info-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(240,147,251,0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
        }
        .info-icon i {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 16px;
        }
        .info-content { flex: 1; }
        .info-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 14px;
            color: #1a1a2e;
            text-decoration: none;
            font-weight: 500;
        }
        .info-value:hover { color: #667eea; }
        .social-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(102,126,234,0.2);
        }
        .social-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 16px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .social-link {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s;
        }
        .social-link:hover { transform: scale(1.1); }
        .social-linkedin { background: linear-gradient(135deg, #0077b5, #00669c); }
        .social-facebook { background: linear-gradient(135deg, #1877f2, #0d65d9); }
        .social-instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .social-youtube { background: linear-gradient(135deg, #ff0000, #cc0000); }
        .save-btn {
            display: block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: #fff;
            text-align: center;
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 15px 40px rgba(102,126,234,0.4);
            transition: all 0.3s;
        }
        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(102,126,234,0.5);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="main-card">
            <div class="avatar-wrapper">
                <img src="https://randomuser.me/api/portraits/women/26.jpg" alt="Priya Sharma" class="avatar">
                <div class="status-badge"></div>
            </div>
            <h1 class="name">Priya Sharma</h1>
            <p class="title">UX Design Lead</p>
            <p class="company">PixelPerfect Studios</p>
            <p class="bio">Crafting intuitive digital experiences that delight users and drive business results. Passionate about accessibility and inclusive design.</p>
            <div class="actions">
                <a href="tel:+27845678901" class="action-btn btn-call"><i class="fas fa-phone"></i></a>
                <a href="mailto:priya@pixelperfect.co.za" class="action-btn btn-email"><i class="fas fa-envelope"></i></a>
                <a href="https://wa.me/27845678901" class="action-btn btn-whatsapp"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.pixelperfect.co.za" class="action-btn btn-web"><i class="fas fa-globe"></i></a>
            </div>
        </div>

        <div class="info-card">
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-phone"></i></div>
                <div class="info-content">
                    <div class="info-label">Phone</div>
                    <a href="tel:+27845678901" class="info-value">084 567 8901</a>
                </div>
            </div>
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-envelope"></i></div>
                <div class="info-content">
                    <div class="info-label">Email</div>
                    <a href="mailto:priya@pixelperfect.co.za" class="info-value">priya@pixelperfect.co.za</a>
                </div>
            </div>
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="info-content">
                    <div class="info-label">Location</div>
                    <span class="info-value">Umhlanga, Durban</span>
                </div>
            </div>
        </div>

        <div class="social-card">
            <div class="social-title">Connect with me</div>
            <div class="social-links">
                <a href="https://linkedin.com/in/priyasharma" class="social-link social-linkedin"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://facebook.com/pixelperfect" class="social-link social-facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="https://instagram.com/priya.designs" class="social-link social-instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://youtube.com/@priyauxdesign" class="social-link social-youtube"><i class="fab fa-youtube"></i></a>
            </div>
        </div>

        <a href="priya_sharma.vcf" class="save-btn"><i class="fas fa-user-plus"></i> Add to Contacts</a>
    </div>
    <script src="../vcard-generator.js"></script>
</body>
</html>
