<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richard Blackwood - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/20.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Raleway', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: linear-gradient(145deg, #1f1f35, #151525);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #d4af37, #f4e3a6, #d4af37);
        }
        .header {
            padding: 50px 30px 30px;
            text-align: center;
            background: linear-gradient(180deg, rgba(212,175,55,0.1) 0%, transparent 100%);
        }
        .logo-mark {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #d4af37;
            border-radius: 12px;
            font-family: 'Cinzel', serif;
            font-size: 24px;
            color: #d4af37;
            font-weight: 700;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d4af37;
            margin-bottom: 24px;
            box-shadow: 0 0 40px rgba(212,175,55,0.3);
        }
        .name {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .title {
            font-size: 13px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .company {
            font-size: 14px;
            color: #888;
            font-weight: 300;
        }
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 30px;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3), transparent);
        }
        .divider-icon {
            padding: 0 20px;
            color: #d4af37;
            font-size: 12px;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 0 30px 30px;
        }
        .action-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #d4af37;
            font-size: 18px;
            background: rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.3);
            transition: all 0.3s;
        }
        .action-btn:hover {
            background: #d4af37;
            color: #1a1a2e;
            box-shadow: 0 0 30px rgba(212,175,55,0.4);
        }
        .body {
            padding: 0 30px 30px;
        }
        .info-section {
            margin-bottom: 30px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-decoration: none;
        }
        .info-item:last-child { border-bottom: none; }
        .info-icon {
            width: 40px;
            color: #d4af37;
            font-size: 16px;
        }
        .info-content { flex: 1; }
        .info-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }
        .info-value {
            font-size: 14px;
            color: #ccc;
            font-weight: 400;
        }
        .social-section {
            padding: 24px;
            background: rgba(0,0,0,0.3);
            margin: 0 -30px;
            text-align: center;
        }
        .social-title {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 16px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .social-link {
            color: #666;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .social-link:hover { color: #d4af37; }
        .footer {
            padding: 30px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px;
            background: linear-gradient(135deg, #d4af37, #c9a227);
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 12px;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .save-btn:hover {
            box-shadow: 0 10px 40px rgba(212,175,55,0.4);
            transform: translateY(-2px);
        }
        .footer-text {
            font-size: 10px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo-mark">RB</div>
            <img src="https://randomuser.me/api/portraits/men/83.jpg" alt="Richard Blackwood" class="avatar">
            <h1 class="name">Richard Blackwood</h1>
            <p class="title">Chief Executive Officer</p>
            <p class="company">Sterling Capital Group</p>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-icon"><i class="fas fa-diamond"></i></div>
            <div class="divider-line"></div>
        </div>

        <div class="action-buttons">
            <a href="tel:+27115551234" class="action-btn"><i class="fas fa-phone"></i></a>
            <a href="mailto:richard@sterlingcapital.co.za" class="action-btn"><i class="fas fa-envelope"></i></a>
            <a href="https://wa.me/27825551234" class="action-btn"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.sterlingcapital.co.za" class="action-btn"><i class="fas fa-globe"></i></a>
        </div>

        <div class="body">
            <div class="info-section">
                <a href="tel:+27115551234" class="info-item">
                    <div class="info-icon"><i class="fas fa-phone"></i></div>
                    <div class="info-content">
                        <div class="info-label">Direct Line</div>
                        <div class="info-value">011 555 1234</div>
                    </div>
                </a>
                <a href="mailto:richard@sterlingcapital.co.za" class="info-item">
                    <div class="info-icon"><i class="fas fa-envelope"></i></div>
                    <div class="info-content">
                        <div class="info-label">Email</div>
                        <div class="info-value">richard@sterlingcapital.co.za</div>
                    </div>
                </a>
                <a href="https://www.sterlingcapital.co.za" class="info-item">
                    <div class="info-icon"><i class="fas fa-globe"></i></div>
                    <div class="info-content">
                        <div class="info-label">Website</div>
                        <div class="info-value">sterlingcapital.co.za</div>
                    </div>
                </a>
                <a href="https://maps.google.com/?q=The+Leonardo,+Sandton" class="info-item">
                    <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                    <div class="info-content">
                        <div class="info-label">Office</div>
                        <div class="info-value">The Leonardo, Sandton</div>
                    </div>
                </a>
            </div>

            <div class="social-section">
                <div class="social-title">Connect</div>
                <div class="social-links">
                    <a href="https://linkedin.com/in/richardblackwood" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                    <a href="https://twitter.com/richardblackwood" class="social-link"><i class="fab fa-x-twitter"></i></a>
                    <a href="https://facebook.com/sterlingcapitalgroup" class="social-link"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://instagram.com/sterlingcapital" class="social-link"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="richard_blackwood.vcf" class="save-btn"><i class="fas fa-user-plus"></i> Save Contact</a>
            <p class="footer-text">Sterling Capital Group &bull; Est. 2008</p>
        </div>
    </div>
    <script src="../vcard-generator.js"></script>
</body>
</html>
