<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Anderson - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/02.css">
    <link rel="stylesheet" href="./css/theme-tweaker.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@latest/dist/cdn.min.js"></script>
    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: var(--card-bg-color);
            max-width: 420px;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            padding: 40px 30px 60px;
            position: relative;
        }
        .company-logo {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: #fff;
            font-weight: 700;
        }
        .header h1 {
            color: var(--header-color);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .header .title {
            color: var(--header-color);
            opacity: 0.8;
            font-size: 16px;
            font-weight: 500;
        }
        .header .company {
            color: var(--header-color);
            opacity: 0.6;
            font-size: 14px;
            margin-top: 4px;
        }
        .avatar-container {
            position: absolute;
            bottom: -50px;
            right: 30px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            object-fit: cover;
            border: 4px solid var(--avatar-border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .content {
            padding: 30px;
            padding-top: 20px;
        }
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
            margin-top: 40px;
        }
        .quick-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            padding: 16px 8px;
            border-radius: var(--button-radius);
            background: var(--action-button-bg-color);
            color: var(--action-button-text-color);
            transition: all 0.2s;
            aspect-ratio: 1;
            justify-content: center;
        }
        .quick-action:hover {
            background: var(--action-button-text-color);
        }
        .quick-action:hover i,
        .quick-action:hover span {
            color: var(--action-button-bg-color);
        }
        .quick-action i {
            font-size: 20px;
            color: var(--action-button-text-color);
            margin-bottom: 8px;
            transition: color 0.2s;
        }
        .quick-action span {
            font-size: 11px;
            color: var(--action-button-text-color);
            font-weight: 500;
            transition: color 0.2s;
        }
        .info-list {
            margin-bottom: 24px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 16px;
            /* background: #f8fafc; */
            border-radius: var(--button-radius);
            margin-bottom: 10px;
            text-decoration: none;
            transition: all 0.2s;
            position: relative;
        }
        .info-item:hover {
            /* background: #e2e8f0; */
            transform: translateX(4px);
        }

        .info-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: var(--card-bg-color);
            transform: translateX(4px);
            border-radius: 15px;
            opacity: 0.15;
            margin: 0px -4px;
            filter: brightness(0.9);
            transition: 0.3s all;
        }
        .info-item:hover::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: var(--info-item-icon-bg-color);
            transform: translateX(4px);
            border-radius: 15px;
            opacity: 0.15;
            margin: 0px -4px;
            transition: 0.3s all;
        }
        .info-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--button-radius);
            background: var(--info-item-icon-bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
        }
        .info-icon i {
            color: var(--info-item-icon-text-color);
            font-size: 16px;
        }
        .info-text {
            flex: 1;
        }
        .info-label {
            font-size: 12px;
            color: var(--info-item-label-color);
            margin-bottom: 2px;
        }
        .info-value {
            font-size: 14px;
            color: var(--info-item-text-color);
            font-weight: 500;
        }
        .info-arrow {
            color: #cbd5e1;
            font-size: 14px;
        }
        .social-section {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        .social-title {
            font-size: 12px;
            color: var(--info-item-label-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .social-link {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .social-link:hover { transform: scale(1.1); }
        .social-linkedin { background: #0077b5; }
        .social-facebook { background: #1877f2; }
        .social-instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .social-twitter { background: #000; }
        .save-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
            padding: 16px;
            /* background: var(--cta-button-bg-color); */
            color: var(--cta-button-text-color);
            text-decoration: none;
            border-radius: var(--button-radius);
            font-weight: 600;
            transition: all 0.2s;
            position: relative;
            z-index: 0;
        }
        .save-contact::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 50%;
    height: 70%;
    background: var(--cta-button-bg-color);
    z-index: -2;
    border-radius: var(--button-radius);
    display: flex;
    transition: all 0.3s;
    right: 0;
    margin: 0 auto;
    transition: 0.3s all;
}
        .save-contact:hover::before {
            content: '';
            position: absolute;
            top: 10px;
            width: 95%;
            height: 100%;
            background-color: var(--cta-button-bg-color);
            /* z-index: -1; */
            filter: blur(14px) saturate(2) opacity(0.3);
            margin: 0 auto;
            left: 0;
            right: 0;
            opacity: 1;
            transition: 0.3s all;
        }
        .save-contact:hover::after{
            filter: brightness(0.8);
        }
        .save-contact::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--cta-button-bg-color);
    z-index: -1;
    opacity: 1;
    border-radius: var(--button-radius);
    transition: all 0.3s;
}
        .save-contact:hover {
            transform: translateY(-2px);
            /* box-shadow: 0 10px 30px rgba(30,64,175,0.3); */
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script defer src="./js/theme-tweaker.js"></script>
</head>

</html>
