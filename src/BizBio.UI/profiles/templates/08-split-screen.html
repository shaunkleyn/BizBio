<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomvula Dlamini - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.12);
        }
        .left-panel {
            background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%);
            padding: 40px 30px;
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.2);
            margin-bottom: 24px;
        }
        .name {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .title {
            font-size: 14px;
            color: #3498db;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .company {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        .quick-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }
        .quick-btn {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            transition: all 0.3s;
        }
        .quick-btn:hover { transform: translateY(-3px); }
        .btn-call { background: #27ae60; }
        .btn-email { background: #3498db; }
        .btn-whatsapp { background: #25d366; }
        .btn-web { background: #9b59b6; }
        .right-panel {
            background: #fff;
            padding: 30px;
        }
        .section-title {
            font-size: 12px;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .info-list {
            margin-bottom: 28px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #ecf0f1;
            text-decoration: none;
        }
        .info-item:last-child { border-bottom: none; }
        .info-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            color: #3498db;
        }
        .info-content { flex: 1; }
        .info-label {
            font-size: 11px;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 14px;
            color: #2c3e50;
            font-weight: 500;
        }
        .social-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }
        .social-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            text-decoration: none;
            color: #2c3e50;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .social-item:hover {
            background: #2c3e50;
            color: #fff;
        }
        .social-item i {
            margin-right: 8px;
            font-size: 16px;
        }
        .save-btn {
            display: block;
            padding: 16px;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(44,62,80,0.3);
        }
        .save-btn i { margin-right: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="left-panel">
            <img src="https://randomuser.me/api/portraits/women/33.jpg" alt="Nomvula Dlamini" class="avatar">
            <h1 class="name">Nomvula Dlamini</h1>
            <p class="title">Business Consultant</p>
            <p class="company">Ascend Advisory Group</p>
            <div class="quick-actions">
                <a href="tel:+27724567890" class="quick-btn btn-call"><i class="fas fa-phone"></i></a>
                <a href="mailto:nomvula@ascendadvisory.co.za" class="quick-btn btn-email"><i class="fas fa-envelope"></i></a>
                <a href="https://wa.me/27724567890" class="quick-btn btn-whatsapp"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.ascendadvisory.co.za" class="quick-btn btn-web"><i class="fas fa-globe"></i></a>
            </div>
        </div>

        <div class="right-panel">
            <div class="section-title">Contact Information</div>
            <div class="info-list">
                <a href="tel:+27724567890" class="info-item">
                    <div class="info-icon"><i class="fas fa-phone"></i></div>
                    <div class="info-content">
                        <div class="info-label">Phone</div>
                        <div class="info-value">072 456 7890</div>
                    </div>
                </a>
                <a href="mailto:nomvula@ascendadvisory.co.za" class="info-item">
                    <div class="info-icon"><i class="fas fa-envelope"></i></div>
                    <div class="info-content">
                        <div class="info-label">Email</div>
                        <div class="info-value">nomvula@ascendadvisory.co.za</div>
                    </div>
                </a>
                <a href="https://www.ascendadvisory.co.za" class="info-item">
                    <div class="info-icon"><i class="fas fa-globe"></i></div>
                    <div class="info-content">
                        <div class="info-label">Website</div>
                        <div class="info-value">www.ascendadvisory.co.za</div>
                    </div>
                </a>
                <a href="https://maps.google.com/?q=Rosebank,+Johannesburg" class="info-item">
                    <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                    <div class="info-content">
                        <div class="info-label">Address</div>
                        <div class="info-value">Rosebank, Johannesburg</div>
                    </div>
                </a>
            </div>

            <div class="section-title">Social Media</div>
            <div class="social-list">
                <a href="https://linkedin.com/in/nomvuladlamini" class="social-item"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
                <a href="https://facebook.com/ascendadvisory" class="social-item"><i class="fab fa-facebook-f"></i> Facebook</a>
                <a href="https://instagram.com/nomvuladlamini" class="social-item"><i class="fab fa-instagram"></i> Instagram</a>
                <a href="https://twitter.com/nomvuladlamini" class="social-item"><i class="fab fa-x-twitter"></i> Twitter</a>
            </div>

            <a href="nomvula_dlamini.vcf" class="save-btn"><i class="fas fa-user-plus"></i> Save Contact</a>
        </div>
    </div>
    <script src="../vcard-generator.js"></script>
</body>
</html>
