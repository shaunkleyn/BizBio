<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sasha Rodriguez - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rubik', sans-serif;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 400px;
            width: 100%;
        }
        .main-card {
            background: #fff;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(255,8,68,0.3);
        }
        .header {
            background: linear-gradient(135deg, #ff0844 0%, #ff6b6b 50%, #feca57 100%);
            padding: 40px 24px;
            text-align: center;
            position: relative;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: #fff;
            border-radius: 32px 32px 0 0;
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 28px;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.4);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .name {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }
        .title {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        .content {
            padding: 10px 24px 24px;
        }
        .action-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            font-size: 22px;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .action-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }
        .btn-call { background: linear-gradient(135deg, #00c9ff, #92fe9d); }
        .btn-email { background: linear-gradient(135deg, #ff0844, #ffb199); }
        .btn-whatsapp { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .btn-web { background: linear-gradient(135deg, #7f00ff, #e100ff); }
        .info-section {
            background: #f8f9fa;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            text-decoration: none;
        }
        .info-item + .info-item {
            border-top: 1px solid #eee;
        }
        .info-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            font-size: 16px;
        }
        .icon-phone { background: linear-gradient(135deg, #00c9ff, #92fe9d); color: #fff; }
        .icon-email { background: linear-gradient(135deg, #ff0844, #ffb199); color: #fff; }
        .icon-web { background: linear-gradient(135deg, #7f00ff, #e100ff); color: #fff; }
        .icon-location { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
        .info-content { flex: 1; }
        .info-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .info-value {
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }
        .social-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .social-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 14px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .social-link {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s;
        }
        .social-link:hover { transform: scale(1.1); }
        .social-linkedin { background: linear-gradient(135deg, #0077b5, #00a0dc); color: #fff; }
        .social-facebook { background: linear-gradient(135deg, #1877f2, #3b9dff); color: #fff; }
        .social-instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: #fff; }
        .social-twitter { background: linear-gradient(135deg, #000, #333); color: #fff; }
        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px;
            background: linear-gradient(135deg, #ff0844 0%, #ff6b6b 50%, #feca57 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255,8,68,0.3);
        }
        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,8,68,0.4);
        }
    </style>
</head>
<body>
    <div class="card">

            <div class="content">

                    <a href="https://wa.me/27867654321" class="action-btn btn-whatsapp"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://www.pulsemarketing.co.za" class="action-btn btn-web"><i class="fas fa-globe"></i></a>

                <div class="info-section">
                    <a href="tel:+27867654321" class="info-item">

                            <div class="info-label">Email</div>
                            <div class="info-value">sasha@pulsemarketing.co.za</div>

                    </a>
                    <a href="https://www.pulsemarketing.co.za" class="info-item">
                        <div class="info-icon icon-web"><i class="fas fa-globe"></i></div>
                        <div class="info-content">
                            <div class="info-label">Website</div>

                    </a>
                    <a href="https://maps.google.com/?q=Braamfontein,+Johannesburg" class="info-item">
                        <div class="info-icon icon-location"><i class="fas fa-map-marker-alt"></i></div>

                            <div class="info-value">Braamfontein, JHB</div>

                <div class="social-section">
                    <div class="social-title">Follow Me</div>
                    <div class="social-links">
                        <a href="https://linkedin.com/in/sasharodriguez" class="social-link social-linkedin"><i class="fab fa-linkedin-in"></i></a>
                        <a href="https://facebook.com/pulsemarketing" class="social-link social-facebook"><i class="fab fa-facebook-f"></i></a>
                        <a href="https://instagram.com/sasharodriguez" class="social-link social-instagram"><i class="fab fa-instagram"></i></a>
                        <a href="https://twitter.com/sasharodriguez" class="social-link social-twitter"><i class="fab fa-x-twitter"></i></a>
                    </div>
                </div>

                <a href="sasha_rodriguez.vcf" class="save-btn"><i class="fas fa-user-plus"></i> Add to Contacts</a>
            </div>
        </div>
    </div>
    <script src="../vcard-generator.js"></script>
</body>
</html>
