<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcus Van Der Berg - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: linear-gradient(145deg, #151515 0%, #0d0d0d 100%);
            max-width: 400px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .header {
            padding: 50px 30px 30px;
            text-align: center;
            position: relative;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #d4af37, #f4e3a6, #d4af37);
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d4af37;
            margin-bottom: 24px;
            box-shadow: 0 0 30px rgba(212,175,55,0.3);
        }
        .name {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .title {
            font-size: 13px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .company {
            font-size: 14px;
            color: #666;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 30px auto;
        }
        .actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 0 30px 30px;
        }
        .action-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #d4af37;
            font-size: 20px;
            background: rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.3);
            transition: all 0.3s;
        }
        .action-btn:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 30px rgba(212,175,55,0.4);
        }
        .info-section {
            padding: 0 30px 30px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #1f1f1f;
        }
        .info-item:last-child { border-bottom: none; }
        .info-icon {
            width: 40px;
            color: #d4af37;
            font-size: 16px;
        }
        .info-content {
            flex: 1;
        }
        .info-label {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 14px;
            color: #ccc;
            text-decoration: none;
            transition: color 0.2s;
        }
        .info-value:hover { color: #d4af37; }
        .social-section {
            background: #0f0f0f;
            padding: 24px 30px;
            text-align: center;
        }
        .social-title {
            font-size: 10px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .social-link {
            color: #555;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .social-link:hover { color: #d4af37; transform: translateY(-2px); }
        .save-btn {
            display: block;
            margin: 0 30px 30px;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37, #b8962f);
            color: #000;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .save-btn:hover {
            box-shadow: 0 10px 30px rgba(212,175,55,0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="https://randomuser.me/api/portraits/men/75.jpg" alt="Marcus Van Der Berg" class="avatar">
            <h1 class="name">Marcus Van Der Berg</h1>
            <p class="title">Managing Partner</p>
            <p class="company">Van Der Berg & Associates</p>
        </div>

        <div class="divider"></div>

        <div class="actions">
            <a href="tel:+27219876543" class="action-btn"><i class="fas fa-phone"></i></a>
            <a href="mailto:marcus@vdblegal.co.za" class="action-btn"><i class="fas fa-envelope"></i></a>
            <a href="https://wa.me/27824561234" class="action-btn"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.vdblegal.co.za" class="action-btn"><i class="fas fa-globe"></i></a>
        </div>

        <div class="info-section">
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-phone"></i></div>
                <div class="info-content">
                    <div class="info-label">Phone</div>
                    <a href="tel:+27824561234" class="info-value">082 456 1234</a>
                </div>
            </div>
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-envelope"></i></div>
                <div class="info-content">
                    <div class="info-label">Email</div>
                    <a href="mailto:marcus@vdblegal.co.za" class="info-value">marcus@vdblegal.co.za</a>
                </div>
            </div>
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-globe"></i></div>
                <div class="info-content">
                    <div class="info-label">Website</div>
                    <a href="https://www.vdblegal.co.za" class="info-value">www.vdblegal.co.za</a>
                </div>
            </div>
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="info-content">
                    <div class="info-label">Address</div>
                    <span class="info-value">V&A Waterfront, Cape Town</span>
                </div>
            </div>
        </div>

        <div class="social-section">
            <div class="social-title">Follow Me</div>
            <div class="social-links">
                <a href="https://linkedin.com/in/marcusvdb" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://facebook.com/vdblegal" class="social-link"><i class="fab fa-facebook-f"></i></a>
                <a href="https://instagram.com/vdblegal" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="https://twitter.com/marcusvdb" class="social-link"><i class="fab fa-x-twitter"></i></a>
            </div>
        </div>

        <a href="marcus_vdb.vcf" class="save-btn"><i class="fas fa-download"></i> Save Contact</a>
    </div>
    <script src="../vcard-generator.js"></script>
</body>
</html>
