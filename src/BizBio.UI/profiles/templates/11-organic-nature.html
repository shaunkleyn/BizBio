<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thandi Khumalo - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(180deg, #f5f0e8 0%, #e8e0d0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: #fffdf9;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(139,115,85,0.15);
        }
        .header {
            background: linear-gradient(135deg, #5f7161 0%, #6d8b74 100%);
            padding: 50px 30px;
            text-align: center;
            position: relative;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 40px;
            background: #fffdf9;
            border-radius: 50%;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid rgba(255,255,255,0.3);
            margin-bottom: 20px;
        }
        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        .title {
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
        .content {
            padding: 40px 30px;
        }
        .bio {
            text-align: center;
            font-style: italic;
            color: #8b7355;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid #e8e0d0;
        }
        .actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        .action-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s;
        }
        .btn-call {
            background: #5f7161;
            color: #fff;
        }
        .btn-email {
            background: #8b7355;
            color: #fff;
        }
        .btn-whatsapp {
            background: #6d8b74;
            color: #fff;
        }
        .btn-web {
            background: #a4907c;
            color: #fff;
        }
        .action-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .info-list {
            margin-bottom: 30px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0ebe3;
            text-decoration: none;
        }
        .info-item:last-child { border-bottom: none; }
        .info-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #f5f0e8;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            color: #5f7161;
        }
        .info-content { flex: 1; }
        .info-label {
            font-size: 11px;
            color: #a4907c;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        .info-value {
            font-size: 14px;
            color: #5a4a3a;
            font-weight: 700;
        }
        .social-section {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid #f0ebe3;
        }
        .social-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            color: #8b7355;
            margin-bottom: 16px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 14px;
        }
        .social-link {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5f7161;
            text-decoration: none;
            font-size: 16px;
            border: 2px solid #e8e0d0;
            transition: all 0.3s;
        }
        .social-link:hover {
            background: #5f7161;
            color: #fff;
            border-color: #5f7161;
        }
        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            padding: 18px;
            background: linear-gradient(135deg, #5f7161, #6d8b74);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
            transition: all 0.3s;
        }
        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(95,113,97,0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="https://randomuser.me/api/portraits/women/22.jpg" alt="Thandi Khumalo" class="avatar">
            <h1 class="name">Thandi Khumalo</h1>
            <p class="title">Wellness Coach</p>
        </div>

        <div class="content">
            <p class="bio">"Nurturing mind, body, and soul through holistic wellness practices and sustainable living."</p>

            <div class="actions">
                <a href="tel:+27731234567" class="action-btn btn-call"><i class="fas fa-phone"></i></a>
                <a href="mailto:thandi@harmonyliving.co.za" class="action-btn btn-email"><i class="fas fa-envelope"></i></a>
                <a href="https://wa.me/27731234567" class="action-btn btn-whatsapp"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.harmonyliving.co.za" class="action-btn btn-web"><i class="fas fa-globe"></i></a>
            </div>

            <div class="info-list">
                <a href="tel:+27731234567" class="info-item">
                    <div class="info-icon"><i class="fas fa-phone"></i></div>
                    <div class="info-content">
                        <div class="info-label">Phone</div>
                        <div class="info-value">073 123 4567</div>
                    </div>
                </a>
                <a href="mailto:thandi@harmonyliving.co.za" class="info-item">
                    <div class="info-icon"><i class="fas fa-envelope"></i></div>
                    <div class="info-content">
                        <div class="info-label">Email</div>
                        <div class="info-value">thandi@harmonyliving.co.za</div>
                    </div>
                </a>
                <a href="https://maps.google.com/?q=Knysna,+South+Africa" class="info-item">
                    <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                    <div class="info-content">
                        <div class="info-label">Location</div>
                        <div class="info-value">Knysna, Garden Route</div>
                    </div>
                </a>
            </div>

            <div class="social-section">
                <div class="social-title">Let's Connect</div>
                <div class="social-links">
                    <a href="https://linkedin.com/in/thandikhumalo" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                    <a href="https://facebook.com/harmonyliving" class="social-link"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://instagram.com/thandiwellness" class="social-link"><i class="fab fa-instagram"></i></a>
                    <a href="https://pinterest.com/thandiwellness" class="social-link"><i class="fab fa-pinterest-p"></i></a>
                </div>
            </div>

            <a href="thandi_khumalo.vcf" class="save-btn"><i class="fas fa-leaf"></i> Save Contact</a>
        </div>
    </div>
    <script src="../vcard-generator.js"></script>
</body>
</html>
