<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emma Thompson - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/27.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Open Sans', sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 380px;
            width: 100%;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        .header {
            position: relative;
            height: 200px;
            background: linear-gradient(135deg, #c0847e 0%, #b87d7d 50%, #9f7a7a 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .wave-decoration {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
        }
        .wave-decoration svg {
            width: 100%;
            height: 100%;
        }
        .avatar-container {
            position: relative;
            z-index: 10;
            transform: translateY(50%);
        }
        .avatar-ring {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #7eb5b0;
            padding: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .body {
            padding: 70px 30px 0;
            text-align: center;
        }
        .footer {
            padding: 0 30px 30px;
        }
        .name {
            font-family: 'Spectral', serif;
            font-size: 24px;
            font-weight: 600;
            color: #2d2d2d;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .handle {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 20px;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .social-btn {
            color: #4b5563;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .social-btn:hover {
            color: #c0847e;
            transform: translateY(-3px);
        }
        .bio {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 8px;
        }
        .company {
            font-size: 13px;
            color: #9ca3af;
            font-style: italic;
            margin-bottom: 24px;
        }
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
            margin-bottom: 24px;
        }
        .info-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 24px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: #fafafa;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .info-item:hover {
            background: #f5f0eb;
            transform: translateX(5px);
        }
        .info-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #c0847e, #b87d7d);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            margin-right: 14px;
        }
        .info-text {
            flex: 1;
            text-align: left;
        }
        .info-label {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 14px;
            color: #2d2d2d;
            font-weight: 500;
        }
        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            background: linear-gradient(135deg, #c0847e, #b87d7d);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(192, 132, 126, 0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="wave-decoration">
                <svg viewBox="0 0 400 80" preserveAspectRatio="none">
                    <path d="M0,30 Q50,60 100,40 T200,50 T300,30 T400,45 L400,80 L0,80 Z" fill="#f9d5a7" opacity="0.6"/>
                    <path d="M0,45 Q80,70 150,50 T300,55 T400,40 L400,80 L0,80 Z" fill="#7eb5b0" opacity="0.5"/>
                    <path d="M0,60 Q100,75 200,65 T400,70 L400,80 L0,80 Z" fill="#fff"/>
                </svg>
            </div>
            <div class="avatar-container">
                <div class="avatar-ring">
                    <img src="https://randomuser.me/api/portraits/women/82.jpg" alt="Emma Thompson" class="avatar">
                </div>
            </div>
        </div>

        <div class="body">
            <h1 class="name">Emma Thompson</h1>
            <p class="handle">@emmathompson</p>

            <div class="action-buttons">
                <a href="https://behance.net/emmathompson" class="social-btn"><i class="fab fa-behance"></i></a>
                <a href="https://dribbble.com/emmathompson" class="social-btn"><i class="fab fa-dribbble"></i></a>
                <a href="https://facebook.com/emmathompson" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                <a href="https://instagram.com/emmathompson" class="social-btn"><i class="fab fa-instagram"></i></a>
                <a href="https://twitter.com/emmathompson" class="social-btn"><i class="fab fa-twitter"></i></a>
            </div>

            <p class="bio">Brand and communication strategy, graphic design, illustration, art direction and portrait photography.</p>
            <p class="company">Creative at Artisan Studio</p>

            <div class="divider"></div>

            <div class="info-grid">
                <a href="tel:+27217654321" class="info-item">
                    <div class="info-icon"><i class="fas fa-phone"></i></div>
                    <div class="info-text">
                        <div class="info-label">Phone</div>
                        <div class="info-value">021 765 4321</div>
                    </div>
                </a>
                <a href="mailto:emma@artisanstudio.co.za" class="info-item">
                    <div class="info-icon"><i class="fas fa-envelope"></i></div>
                    <div class="info-text">
                        <div class="info-label">Email</div>
                        <div class="info-value">emma@artisanstudio.co.za</div>
                    </div>
                </a>
                <a href="https://www.artisanstudio.co.za" class="info-item">
                    <div class="info-icon"><i class="fas fa-globe"></i></div>
                    <div class="info-text">
                        <div class="info-label">Website</div>
                        <div class="info-value">artisanstudio.co.za</div>
                    </div>
                </a>
            </div>
        </div>

        <div class="footer">
            <a href="emma_thompson.vcf" class="save-btn">
                <i class="fas fa-user-plus"></i> Save Contact
            </a>
        </div>
    </div>
    <script src="../vcard-generator.js"></script>
</body>
</html>
