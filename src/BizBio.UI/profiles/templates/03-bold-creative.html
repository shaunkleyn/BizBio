<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zara Nkosi - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 400px;
            width: 100%;
        }
        .profile-section {
            background: #fff;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #ff6b6b;
            margin-bottom: 24px;
        }
        .name {
            font-size: 32px;
            font-weight: 800;
            color: #2d3436;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .title {
            font-size: 16px;
            color: #ff6b6b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .company {
            font-size: 14px;
            color: #636e72;
        }
        .tagline {
            margin-top: 20px;
            padding: 16px 24px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .action-card {
            background: #fff;
            border-radius: 20px;
            padding: 24px 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .action-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            margin-bottom: 12px;
        }
        .icon-call { background: linear-gradient(135deg, #00b894, #00a085); }
        .icon-email { background: linear-gradient(135deg, #0984e3, #0770c2); }
        .icon-whatsapp { background: linear-gradient(135deg, #25d366, #20bd5a); }
        .icon-web { background: linear-gradient(135deg, #6c5ce7, #5b4cdb); }
        .action-label {
            font-size: 14px;
            font-weight: 600;
            color: #2d3436;
        }
        .info-card {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .info-row {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 2px dashed #f0f0f0;
        }
        .info-row:last-child { border-bottom: none; }
        .info-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #fff5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            color: #ff6b6b;
            font-size: 18px;
        }
        .info-content {
            flex: 1;
        }
        .info-label {
            font-size: 11px;
            color: #b2bec3;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 14px;
            color: #2d3436;
            font-weight: 600;
            text-decoration: none;
        }
        .info-value:hover { color: #ff6b6b; }
        .social-bar {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            transition: transform 0.3s;
        }
        .social-link:hover { transform: scale(1.15) rotate(5deg); }
        .social-linkedin { background: #0077b5; }
        .social-facebook { background: #1877f2; }
        .social-instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .social-tiktok { background: #000; }
        .save-btn {
            display: block;
            background: #fff;
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .save-btn:hover {
            background: #2d3436;
            color: #fff;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="profile-section">
            <img src="https://randomuser.me/api/portraits/women/68.jpg" alt="Zara Nkosi" class="avatar">
            <h1 class="name">Zara Nkosi</h1>
            <p class="title">Creative Director</p>
            <p class="company">Firefly Design Studio</p>
            <div class="tagline">Turning Ideas Into Visual Magic</div>
        </div>

        <div class="actions-grid">
            <a href="tel:+27834567890" class="action-card">
                <div class="action-icon icon-call"><i class="fas fa-phone"></i></div>
                <span class="action-label">Call Me</span>
            </a>
            <a href="mailto:zara@fireflydesign.co.za" class="action-card">
                <div class="action-icon icon-email"><i class="fas fa-envelope"></i></div>
                <span class="action-label">Email Me</span>
            </a>
            <a href="https://wa.me/27834567890" class="action-card">
                <div class="action-icon icon-whatsapp"><i class="fab fa-whatsapp"></i></div>
                <span class="action-label">WhatsApp</span>
            </a>
            <a href="https://www.fireflydesign.co.za" class="action-card">
                <div class="action-icon icon-web"><i class="fas fa-globe"></i></div>
                <span class="action-label">Website</span>
            </a>
        </div>

        <div class="info-card">
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-phone"></i></div>
                <div class="info-content">
                    <div class="info-label">Phone</div>
                    <a href="tel:+27834567890" class="info-value">083 456 7890</a>
                </div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-envelope"></i></div>
                <div class="info-content">
                    <div class="info-label">Email</div>
                    <a href="mailto:zara@fireflydesign.co.za" class="info-value">zara@fireflydesign.co.za</a>
                </div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="info-content">
                    <div class="info-label">Location</div>
                    <span class="info-value">Maboneng, Johannesburg</span>
                </div>
            </div>
        </div>

        <div class="social-bar">
            <a href="https://linkedin.com/in/zarankosi" class="social-link social-linkedin"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://facebook.com/fireflydesign" class="social-link social-facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="https://instagram.com/zarankosi.design" class="social-link social-instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://tiktok.com/@zarankosi" class="social-link social-tiktok"><i class="fab fa-tiktok"></i></a>
        </div>

        <a href="zara_nkosi.vcf" class="save-btn"><i class="fas fa-download"></i> Save My Contact</a>
    </div>
    <script src="../vcard-generator.js"></script>
    <script defer src="./js/theme-tweaker.js"></script>
</body>
</html>
