<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pieter Jansen - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/16.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            border: 2px solid #000;
        }
        .header {
            background: #000;
            padding: 40px 30px;
            text-align: center;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            margin-bottom: 20px;
            filter: grayscale(100%);
        }
        .name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            color: #fff;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
        }
        .action-buttons {
            display: flex;
            border-bottom: 2px solid #000;
        }
        .action-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-decoration: none;
            color: #000;
            border-right: 2px solid #000;
            transition: all 0.3s;
        }
        .action-btn:last-child { border-right: none; }
        .action-btn:hover {
            background: #000;
            color: #fff;
        }
        .action-btn i {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .action-btn span {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .body {
            padding: 30px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #eee;
            text-decoration: none;
        }
        .info-item:last-child { border-bottom: none; }
        .info-icon {
            width: 40px;
            color: #000;
            font-size: 16px;
        }
        .info-content { flex: 1; }
        .info-label {
            font-size: 10px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .info-value {
            font-size: 14px;
            color: #000;
            font-weight: 500;
        }
        .social-section {
            padding: 24px 30px;
            background: #f5f5f5;
            text-align: center;
        }
        .social-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 3px;
            margin-bottom: 16px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .social-link {
            color: #000;
            font-size: 20px;
            text-decoration: none;
            transition: opacity 0.3s;
        }
        .social-link:hover { opacity: 0.5; }
        .footer {
            display: block;
        }
        .save-btn {
            display: block;
            padding: 20px;
            background: #000;
            color: #fff;
            text-align: center;
            text-decoration: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 3px;
            transition: all 0.3s;
        }
        .save-btn:hover {
            background: #333;
        }
        .save-btn i { margin-right: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="https://randomuser.me/api/portraits/men/55.jpg" alt="Pieter Jansen" class="avatar">
            <h1 class="name">Pieter Jansen</h1>
            <p class="title">Principal Architect / Form & Function Studio</p>
        </div>

        <div class="action-buttons">
            <a href="tel:+27214567890" class="action-btn">
                <i class="fas fa-phone"></i>
                <span>Call</span>
            </a>
            <a href="mailto:pieter@formfunction.co.za" class="action-btn">
                <i class="fas fa-envelope"></i>
                <span>Email</span>
            </a>
            <a href="https://wa.me/27824567890" class="action-btn">
                <i class="fab fa-whatsapp"></i>
                <span>Chat</span>
            </a>
            <a href="https://www.formfunction.co.za" class="action-btn">
                <i class="fas fa-globe"></i>
                <span>Web</span>
            </a>
        </div>

        <div class="body">
            <a href="tel:+27214567890" class="info-item">
                <div class="info-icon"><i class="fas fa-phone"></i></div>
                <div class="info-content">
                    <div class="info-label">Phone</div>
                    <div class="info-value">021 456 7890</div>
                </div>
            </a>
            <a href="mailto:pieter@formfunction.co.za" class="info-item">
                <div class="info-icon"><i class="fas fa-envelope"></i></div>
                <div class="info-content">
                    <div class="info-label">Email</div>
                    <div class="info-value">pieter@formfunction.co.za</div>
                </div>
            </a>
            <a href="https://www.formfunction.co.za" class="info-item">
                <div class="info-icon"><i class="fas fa-globe"></i></div>
                <div class="info-content">
                    <div class="info-label">Website</div>
                    <div class="info-value">formfunction.co.za</div>
                </div>
            </a>
            <a href="https://maps.google.com/?q=Kloof+Street,+Cape+Town" class="info-item">
                <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="info-content">
                    <div class="info-label">Address</div>
                    <div class="info-value">Kloof Street, Cape Town</div>
                </div>
            </a>

            <div class="social-section">
                <div class="social-title">Connect</div>
                <div class="social-links">
                    <a href="https://linkedin.com/in/pieterjansen" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                    <a href="https://facebook.com/formfunctionstudio" class="social-link"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://instagram.com/formfunctionstudio" class="social-link"><i class="fab fa-instagram"></i></a>
                    <a href="https://twitter.com/pieterjansen" class="social-link"><i class="fab fa-x-twitter"></i></a>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="pieter_jansen.vcf" class="save-btn"><i class="fas fa-download"></i> Save Contact</a>
        </div>
    </div>
    <script src="/profile-assets/vcard-generator.js"></script>
</body>
</html>
