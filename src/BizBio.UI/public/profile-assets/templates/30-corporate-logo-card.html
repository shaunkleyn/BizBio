<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander Stone - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/30.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 380px;
            width: 100%;
            background: #fff;
            border-radius: 45px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            border: 10px solid #1f2937;
            position: relative;
        }
        .body {}
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #1f2937;
            border-radius: 0 0 20px 20px;
            z-index: 100;
        }
        .screen {
            background: #fff;
        }
        .header {
            background: #1f2937;
            padding: 50px 24px 30px;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 12px;
        }
        .logo-icon svg {
            width: 100%;
            height: 100%;
        }
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: #22c55e;
            letter-spacing: 4px;
        }
        .logo-tagline {
            font-size: 11px;
            color: #6b7280;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .profile-section {
            padding: 30px 24px;
            text-align: center;
            background: linear-gradient(180deg, #1f2937 0%, #1f2937 50px, #fff 50px);
        }
        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        .name {
            font-size: 22px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 4px;
        }
        .title {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 16px;
        }
        .bio {
            font-size: 14px;
            color: #9ca3af;
            line-height: 1.6;
            font-style: italic;
        }
        .action-buttons {
            padding: 0 24px 30px;
        }
        .action-btn {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            background: #f9fafb;
            border-radius: 16px;
            margin-bottom: 12px;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid #f3f4f6;
        }
        .action-btn:hover {
            background: #f0fdf4;
            border-color: #22c55e;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.15);
        }
        .action-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #22c55e;
            font-size: 18px;
            margin-right: 16px;
        }
        .action-text {
            font-size: 15px;
            color: #1f2937;
            font-weight: 600;
        }
        .footer {}
        .social-section {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 20px 24px;
            border-top: 1px solid #f3f4f6;
        }
        .social-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .social-btn:hover {
            background: #22c55e;
            color: #fff;
            transform: translateY(-3px);
        }
        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 24px 24px;
            padding: 18px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="notch"></div>
        <div class="screen">
            <div class="header">
                <div class="logo-container">
                    <div class="logo-icon">
                        <svg viewBox="0 0 60 60" fill="none">
                            <path d="M30 5C20 5 12 15 12 25C12 35 20 42 30 42C40 42 48 35 48 25C48 15 40 5 30 5Z" stroke="#22c55e" stroke-width="3" fill="none"/>
                            <path d="M30 15C25 15 20 20 20 27C20 34 25 38 30 38" stroke="#22c55e" stroke-width="3" fill="none"/>
                            <path d="M30 42V55M25 50H35" stroke="#22c55e" stroke-width="3"/>
                        </svg>
                    </div>
                    <div class="logo-text">EVERGREEN</div>
                    <div class="logo-tagline">CONSULTING</div>
                </div>
            </div>

            <div class="body">
                <div class="profile-section">
                    <div class="avatar-container">
                        <img src="https://randomuser.me/api/portraits/men/91.jpg" alt="Alexander Stone" class="avatar">
                    </div>
                    <h1 class="name">Alexander Stone</h1>
                    <p class="title">Managing Director</p>
                    <p class="bio">Over 15 years of experience in strategic consulting, dedicated to driving sustainable growth.</p>
                </div>

                <div class="action-buttons">
                    <a href="mailto:alex@evergreenconsulting.co.za" class="action-btn">
                        <div class="action-icon"><i class="fas fa-envelope"></i></div>
                        <span class="action-text">Email</span>
                    </a>
                    <a href="tel:+27118765432" class="action-btn">
                        <div class="action-icon"><i class="fas fa-phone"></i></div>
                        <span class="action-text">Phone</span>
                    </a>
                    <a href="https://www.evergreenconsulting.co.za" class="action-btn">
                        <div class="action-icon"><i class="fas fa-globe"></i></div>
                        <span class="action-text">Website</span>
                    </a>
                </div>
            </div>

            <div class="footer">
                <div class="social-section">
                    <a href="https://linkedin.com/in/alexanderstone" class="social-btn"><i class="fab fa-linkedin-in"></i></a>
                    <a href="https://twitter.com/alexanderstone" class="social-btn"><i class="fab fa-twitter"></i></a>
                    <a href="https://wa.me/27821234567" class="social-btn"><i class="fab fa-whatsapp"></i></a>
                </div>

                <a href="alexander_stone.vcf" class="save-btn">
                    <i class="fas fa-user-plus"></i> Save Contact
                </a>
            </div>
        </div>
    </div>
    <script src="/profile-assets/vcard-generator.js"></script>
</body>
</html>
