# Azure DevOps Pipeline for SnapTap UI
# This pipeline builds and deploys the SnapTap Nuxt UI to VPS

name: '$(Date:yyyyMMdd).$(Rev:r)'

trigger:
  branches:
    include:
    - main
    - develop
    - feature/*
  paths:
    include:
    - src/BizBio.UI/**

pr:
  branches:
    include:
    - main
    - develop
  paths:
    include:
    - src/BizBio.UI/**

variables:
  nodeVersion: '20.x'
  workingDirectory: '$(Build.SourcesDirectory)/src/BizBio.UI'
  targetDirectory: '/var/www/snaptap/ui'

# ============================================================================
# STAGE: BUILD
# ============================================================================
stages:
- stage: Build
  displayName: 'Build SnapTap UI'
  jobs:
  - job: BuildUI
    displayName: 'Build Nuxt Application'
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: NodeTool@0
      displayName: 'Install Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - task: Cache@2
      displayName: 'Cache node_modules'
      inputs:
        key: 'npm | "$(Agent.OS)" | $(workingDirectory)/package-lock.json'
        path: '$(workingDirectory)/node_modules'
        restoreKeys: |
          npm | "$(Agent.OS)"

    - script: |
        cd $(workingDirectory)
        npm ci
      displayName: 'Install Dependencies'

    - script: |
        cd $(workingDirectory)
        npm run build
      displayName: 'Build Application'
      env:
        NODE_ENV: production

    # Copy profiles into the build output (served by the profiles middleware)
    - script: |
        cp -r $(workingDirectory)/profiles $(workingDirectory)/.output/public/profiles
      displayName: 'Copy profile assets (uncompressed)'

    # Archive fonts separately so they don't bloat ui.zip and cause incomplete extractions.
    # Fonts are deployed to /var/www/snaptap/ui/fonts/ (persistent) and served by Nginx directly.
    - task: ArchiveFiles@2
      displayName: 'Archive FontAwesome (separate artifact)'
      inputs:
        rootFolderOrFile: '$(workingDirectory)/fonts-src'
        includeRootFolder: false
        archiveType: 'tar'
        tarCompression: 'gz'
        archiveFile: '$(Build.ArtifactStagingDirectory)/fonts.tar.gz'
        replaceExistingArchive: true

    # Write build-info.json for version display in DevTools
    - script: |
        echo '{"build":"$(Build.BuildNumber)","release":"pending","attempt":"0","version":"$(Build.BuildNumber)_pending"}' \
          > $(workingDirectory)/.output/public/build-info.json
      displayName: 'Write build info'

    # Verify build output
    - script: |
        echo "=== Build Output Structure ==="
        ls -la $(workingDirectory)/.output/
        echo "=== Public folder ==="
        ls -la $(workingDirectory)/.output/public/ | head -20
        echo "=== Profile Assets ==="
        ls -la $(workingDirectory)/.output/public/profile-assets/ || echo "profile-assets not found"
        echo "=== Profiles ==="
        ls -la $(workingDirectory)/.output/public/profiles/ | head -10 || echo "profiles not found"
      displayName: 'Verify Build Output'

    # Archive the .output directory
    - task: ArchiveFiles@2
      displayName: 'Archive Build Output'
      inputs:
        rootFolderOrFile: '$(workingDirectory)/.output'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/ui.zip'
        replaceExistingArchive: true

    # Copy ecosystem config
    - task: CopyFiles@2
      displayName: 'Copy ecosystem.config.cjs'
      inputs:
        SourceFolder: '$(workingDirectory)'
        Contents: 'ecosystem.config.cjs'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/config'

    # Copy nginx config
    - task: CopyFiles@2
      displayName: 'Copy Nginx Config'
      inputs:
        SourceFolder: '$(workingDirectory)/nginx'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/config/nginx'
      continueOnError: true

    # Copy deployment scripts
    - task: CopyFiles@2
      displayName: 'Copy Deployment Scripts'
      inputs:
        SourceFolder: '$(workingDirectory)/scripts/deploy'
        Contents: '*.sh'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/scripts'
      continueOnError: true

    # Publish artifacts
    - task: PublishBuildArtifacts@1
      displayName: 'Publish UI Artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'ui-build'
        # publishLocation: 'Container'