<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BizBio Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="h-full bg-gray-50">
    <div class="min-h-full flex">
        <div class="flex-1 flex flex-col justify-center py-12 px-4 sm:px-6 lg:flex-none lg:px-20 xl:px-24">
            <div class="mx-auto w-full max-w-sm lg:w-96">
                <div>
                    <a href="index.html" class="text-3xl font-bold text-gray-900">
                        <i class="fas fa-qrcode text-blue-600 mr-2"></i>BizBio
                    </a>
                    <h2 class="mt-6 text-3xl font-bold text-gray-900">Create your account</h2>
                    <p class="mt-2 text-sm text-gray-600">
                        Already have an account?
                        <a href="#" class="font-semibold text-blue-600 hover:text-blue-700">Sign in</a>
                    </p>
                </div>

                <div class="mt-8">
                    <div class="mt-6">
                        <form action="#" method="POST" class="space-y-6">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label for="first-name" class="block text-sm font-medium text-gray-900">First name</label>
                                    <input id="first-name" name="first-name" type="text" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                </div>
                                <div>
                                    <label for="last-name" class="block text-sm font-medium text-gray-900">Last name</label>
                                    <input id="last-name" name="last-name" type="text" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                </div>
                            </div>

                            <div>
                                <label for="email" class="block text-sm font-medium text-gray-900">Email address</label>
                                <input id="email" name="email" type="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>

                            <div>
                                <label for="password" class="block text-sm font-medium text-gray-900">Password</label>
                                <input id="password" name="password" type="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <p class="mt-1 text-xs text-gray-500">Must be at least 8 characters</p>
                            </div>

                            <div>
                                <label for="business-type" class="block text-sm font-medium text-gray-900">I'm interested in</label>
                                <select id="business-type" name="business-type" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                    <option>BizBio Professional (Business Cards)</option>
                                    <option>BizBio Menu (Restaurants)</option>
                                    <option>BizBio Retail (Product Catalogs)</option>
                                    <option>Not sure yet</option>
                                </select>
                            </div>

                            <div class="flex items-start">
                                <input id="terms" name="terms" type="checkbox" required class="h-4 w-4 mt-0.5 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                                <label for="terms" class="ml-2 block text-sm text-gray-900">
                                    I agree to the <a href="terms-of-service.html" class="text-blue-600 hover:text-blue-700">Terms of Service</a> and <a href="privacy-policy.html" class="text-blue-600 hover:text-blue-700">Privacy Policy</a>
                                </label>
                            </div>

                            <div>
                                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                    Create account
                                </button>
                            </div>
                        </form>

                        <div class="mt-6">
                            <div class="relative">
                                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
                                <div class="relative flex justify-center text-sm"><span class="px-2 bg-gray-50 text-gray-500">Or continue with</span></div>
                            </div>

                            <div class="mt-6 grid grid-cols-2 gap-3">
                                <button class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">
                                    <i class="fab fa-google text-red-500 mr-2"></i>Google
                                </button>
                                <button class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">
                                    <i class="fab fa-facebook text-blue-600 mr-2"></i>Facebook
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="hidden lg:block relative w-0 flex-1">
            <div class="absolute inset-0 bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center">
                <div class="text-white text-center px-12">
                    <h2 class="text-4xl font-bold mb-4">Join 500+ South African Businesses</h2>
                    <p class="text-xl mb-8 text-blue-100">Start your free 14-day trial today</p>
                    <div class="space-y-4 text-left max-w-md mx-auto">
                        <div class="flex items-center"><i class="fas fa-check-circle mr-3 text-2xl"></i><span>No credit card required</span></div>
                        <div class="flex items-center"><i class="fas fa-check-circle mr-3 text-2xl"></i><span>Cancel anytime</span></div>
                        <div class="flex items-center"><i class="fas fa-check-circle mr-3 text-2xl"></i><span>Full access to all features</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
