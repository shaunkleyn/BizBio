# Node.js with Vue
# Build a Node.js project that uses Vue.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

name: '$(Date:yyyyMMdd).$(Rev:r)'

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - task: Cache@2
    inputs:
      key: 'npm | "$(Agent.OS)" | src/BizBio.UI/package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: $(Pipeline.Workspace)/.npm
    displayName: 'Cache npm packages'

  - script: |
      cd src/BizBio.UI
      npm ci --cache $(Pipeline.Workspace)/.npm --prefer-offline
    displayName: 'Install Dependencies'

  - script: |
      cd src/BizBio.UI
      npm run build
    displayName: 'Build Nuxt Application'

  - script: |
      cp -r src/BizBio.UI/profiles src/BizBio.UI/.output/public/profiles
    displayName: 'Copy profile assets (uncompressed)'

  - script: |
      echo '{"build":"$(Build.BuildNumber)","release":"pending","attempt":"0","version":"$(Build.BuildNumber)_pending"}' \
        > src/BizBio.UI/.output/public/build-info.json
    displayName: 'Write build info'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Artifacts'
    inputs:
      PathtoPublish: 'src/BizBio.UI/.output'
      ArtifactName: 'ui-build'
