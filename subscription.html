<!DOCTYPE html>
<html>
<head>
    <title>BizBio Subscription Setup</title>
</head>
<body>
    <h2>Generate BizBio Subscription</h2>
    <form action="https://sandbox.payfast.co.za/eng/process" method="post">
        <!-- Change to https://www.payfast.co.za/eng/process for production -->
        
        <input type="hidden" name="merchant_id" value="10000100">
        <input type="hidden" name="merchant_key" value="46f0cd694581a">
        <input type="hidden" name="return_url" value="https://bizbio.co.za/payment-success">
        <input type="hidden" name="cancel_url" value="https://bizbio.co.za/payment-cancelled">
        <input type="hidden" name="notify_url" value="https://bizbio.co.za/api/payfast/notify">
        
        <!-- Subscription fields -->
        <input type="hidden" name="subscription_type" value="1">
        <input type="hidden" name="frequency" value="3">
        <input type="hidden" name="cycles" value="0">
        
        <label>Customer Email:</label>
        <input type="email" name="email_address" required><br><br>
        
        <label>Plan:</label>
        <select name="item_name" onchange="updateAmount(this)">
            <option value="BizBio Basic" data-amount="99">Basic - R99/month</option>
            <option value="BizBio Pro" data-amount="299">Pro - R299/month</option>
            <option value="BizBio Enterprise" data-amount="599">Enterprise - R599/month</option>
        </select><br><br>
        
        <input type="hidden" name="amount" id="amount" value="99.00">
        <input type="hidden" name="recurring_amount" id="recurring_amount" value="99.00">
        <input type="hidden" name="item_description" value="Monthly subscription">
        
        <label>Payment Reference (Your DB ID):</label>
        <input type="text" name="m_payment_id" required><br><br>
        
        <label>First Billing Date:</label>
        <input type="date" name="billing_date" required><br><br>
        
        <button type="submit">Generate Payment Link</button>
    </form>
    
    <script>
        function updateAmount(select) {
            const amount = select.options[select.selectedIndex].dataset.amount;
            document.getElementById('amount').value = amount + '.00';
            document.getElementById('recurring_amount').value = amount + '.00';
        }
        
        // Set default date to today
        document.querySelector('input[name="billing_date"]').valueAsDate = new Date();
    </script>
</body>
</html>
