<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HTML Preview Gallery</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 20px;
    }

    .preview {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      padding: 10px 14px;
      font-size: 14px;
      font-weight: bold;
      background: #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .preview-header a {
      font-size: 12px;
      text-decoration: none;
      color: #007bff;
    }

    iframe {
      border: none;
      width: 100%;
      height: 300px;
      background: white;
    }
  </style>
</head>
<body>

<h1>HTML File Previews</h1>

<div class="grid" id="grid"></div>

<script>
(async () => {
  const response = await fetch('./');
  const text = await response.text();

  // Extract .html links from directory listing
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'text/html');

  const files = [...doc.querySelectorAll('a')]
    .map(a => a.getAttribute('href'))
    .filter(href =>
      href &&
      href.endsWith('.html') &&
      href !== 'index.html'
    );

  const grid = document.getElementById('grid');

  files.forEach(file => {
    const card = document.createElement('div');
    card.className = 'preview';

    card.innerHTML = `
      <div class="preview-header">
        <span>${file}</span>
        <a href="${file}" target="_blank">Open</a>
      </div>
      <iframe src="${file}" loading="lazy"></iframe>
    `;

    grid.appendChild(card);
  });
})();
</script>

</body>
</html>
