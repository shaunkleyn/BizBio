<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcus Chen - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/23.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #1e1b4b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.7;
        }
        .blob-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #ec4899, #f472b6);
            top: -100px;
            left: -50px;
        }
        .blob-2 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #f97316, #fb923c);
            bottom: -80px;
            right: -50px;
        }
        .card {
            max-width: 360px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .avatar-glow {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ec4899, #f97316);
            z-index: -1;
            opacity: 0.5;
            filter: blur(8px);
        }
        .name {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .bio {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .social-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }
        .info-section {
            text-align: left;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 10px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .info-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }
        .info-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            font-size: 14px;
            color: #fff;
        }
        .info-icon.phone { background: linear-gradient(135deg, #22c55e, #4ade80); }
        .info-icon.email { background: linear-gradient(135deg, #ec4899, #f472b6); }
        .info-icon.web { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
        .info-icon.location { background: linear-gradient(135deg, #f97316, #fb923c); }
        .info-content {
            flex: 1;
        }
        .info-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 14px;
            color: #fff;
            font-weight: 500;
        }
        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
            padding: 16px;
            background: linear-gradient(135deg, #ec4899, #f97316);
            color: #fff;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.4);
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card">
        <div class="avatar-container">
            <div class="avatar-glow"></div>
            <img src="https://randomuser.me/api/portraits/men/52.jpg" alt="Marcus Chen" class="avatar">
        </div>

        <h1 class="name">Marcus Chen</h1>
        <p class="bio">Creative Director specializing in brand identity and digital experiences. Turning visions into reality.</p>

        <div class="social-row">
            <a href="https://facebook.com/marcuschen" class="social-btn"><i class="fab fa-facebook-f"></i></a>
            <a href="https://twitter.com/marcuschen" class="social-btn"><i class="fab fa-twitter"></i></a>
            <a href="https://linkedin.com/in/marcuschen" class="social-btn"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://pinterest.com/marcuschen" class="social-btn"><i class="fab fa-pinterest-p"></i></a>
        </div>

        <div class="info-section">
            <a href="tel:+27823456789" class="info-item">
                <div class="info-icon phone"><i class="fas fa-phone"></i></div>
                <div class="info-content">
                    <div class="info-label">Phone</div>
                    <div class="info-value">082 345 6789</div>
                </div>
            </a>
            <a href="mailto:marcus@visioncraft.co.za" class="info-item">
                <div class="info-icon email"><i class="fas fa-envelope"></i></div>
                <div class="info-content">
                    <div class="info-label">Email</div>
                    <div class="info-value">marcus@visioncraft.co.za</div>
                </div>
            </a>
            <a href="https://www.visioncraft.co.za" class="info-item">
                <div class="info-icon web"><i class="fas fa-globe"></i></div>
                <div class="info-content">
                    <div class="info-label">Website</div>
                    <div class="info-value">visioncraft.co.za</div>
                </div>
            </a>
            <a href="https://maps.google.com/?q=Melrose+Arch,+Johannesburg" class="info-item">
                <div class="info-icon location"><i class="fas fa-map-marker-alt"></i></div>
                <div class="info-content">
                    <div class="info-label">Location</div>
                    <div class="info-value">Melrose Arch, JHB</div>
                </div>
            </a>
        </div>

        <a href="marcus_chen.vcf" class="save-btn">
            <i class="fas fa-user-plus"></i> Save Contact
        </a>
    </div>
    <script src="../vcard-generator.js"></script>
</body>
</html>
