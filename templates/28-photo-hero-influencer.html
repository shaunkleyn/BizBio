<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabella Cruz - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', sans-serif;
            background: #8b7355;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 380px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }
        .header {
            position: relative;
        }
        .hero-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }
        .header-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.8) 100%);
        }
        .header-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: #fff;
            letter-spacing: 2px;
        }
        .profile-section {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }
        .avatar-container {
            position: relative;
            display: inline-block;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .pro-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 10px;
            text-transform: uppercase;
        }
        .content {
            padding: 70px 24px 24px;
            text-align: center;
            background: #fff;
        }
        .name {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .title {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 20px;
        }
        .action-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .action-btn {
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        .action-btn.outline {
            border: 2px solid #1a1a1a;
            color: #1a1a1a;
            background: transparent;
        }
        .action-btn.outline:hover {
            background: #1a1a1a;
            color: #fff;
        }
        .action-btn.filled {
            background: #1a1a1a;
            color: #fff;
            border: 2px solid #1a1a1a;
        }
        .action-btn.filled:hover {
            background: #333;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px 0;
            border-top: 1px solid #f3f4f6;
            border-bottom: 1px solid #f3f4f6;
            margin-bottom: 20px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-label {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
        }
        .contact-list {
            text-align: left;
        }
        .contact-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f3f4f6;
            text-decoration: none;
        }
        .contact-item:last-child {
            border-bottom: none;
        }
        .contact-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
            font-size: 14px;
            margin-right: 14px;
        }
        .contact-text {
            flex: 1;
        }
        .contact-label {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .contact-value {
            font-size: 14px;
            color: #1a1a1a;
            font-weight: 500;
        }
        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding: 16px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        .save-btn:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400&h=400&fit=crop" alt="Hero" class="hero-image">
            <div class="header-overlay"></div>
            <span class="header-title">Profile</span>
            <div class="profile-section">
                <div class="avatar-container">
                    <img src="https://randomuser.me/api/portraits/women/90.jpg" alt="Isabella Cruz" class="avatar">
                    <span class="pro-badge">Pro</span>
                </div>
            </div>
        </div>

        <div class="content">
            <h1 class="name">Isabella Cruz</h1>
            <p class="title">Vlogger & Fashion Lover</p>

            <div class="action-row">
                <a href="mailto:isabella@fashionista.co.za" class="action-btn outline">Message</a>
                <a href="#" class="action-btn filled">Follow</a>
            </div>

            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-label">Followers</div>
                    <div class="stat-value">252k</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Following</div>
                    <div class="stat-value">378</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Posts</div>
                    <div class="stat-value">115</div>
                </div>
            </div>

            <div class="contact-list">
                <a href="tel:+27823456789" class="contact-item">
                    <div class="contact-icon"><i class="fas fa-phone"></i></div>
                    <div class="contact-text">
                        <div class="contact-label">Phone</div>
                        <div class="contact-value">082 345 6789</div>
                    </div>
                </a>
                <a href="mailto:isabella@fashionista.co.za" class="contact-item">
                    <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                    <div class="contact-text">
                        <div class="contact-label">Email</div>
                        <div class="contact-value">isabella@fashionista.co.za</div>
                    </div>
                </a>
                <a href="https://instagram.com/isabellacruz" class="contact-item">
                    <div class="contact-icon"><i class="fab fa-instagram"></i></div>
                    <div class="contact-text">
                        <div class="contact-label">Instagram</div>
                        <div class="contact-value">@isabellacruz</div>
                    </div>
                </a>
            </div>

            <a href="isabella_cruz.vcf" class="save-btn">
                <i class="fas fa-user-plus"></i> Save Contact
            </a>
        </div>
    </div>
</body>
</html>
