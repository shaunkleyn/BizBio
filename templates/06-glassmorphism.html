<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lerato Molefe - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            filter: blur(80px);
            opacity: 0.6;
        }
        body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            border-radius: 50%;
            bottom: -50px;
            left: -100px;
            filter: blur(80px);
            opacity: 0.6;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 400px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .header {
            padding: 40px 30px;
            text-align: center;
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.3);
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .name {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .title {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
        }
        .company {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        .actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            padding: 0 30px 30px;
        }
        .action-btn {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .action-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .info-section {
            padding: 0 30px 30px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            margin-bottom: 10px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .info-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
        .info-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            color: rgba(255,255,255,0.8);
        }
        .info-content { flex: 1; }
        .info-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 14px;
            color: #fff;
            font-weight: 500;
        }
        .social-section {
            padding: 24px 30px;
            background: rgba(0,0,0,0.2);
            text-align: center;
        }
        .social-title {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .social-link {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 18px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .social-link:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
            transform: scale(1.1);
        }
        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 30px 30px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .save-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="https://randomuser.me/api/portraits/women/89.jpg" alt="Lerato Molefe" class="avatar">
            <h1 class="name">Lerato Molefe</h1>
            <p class="title">Software Engineer</p>
            <p class="company">CloudSync Technologies</p>
        </div>

        <div class="actions">
            <a href="tel:+27761234567" class="action-btn"><i class="fas fa-phone"></i></a>
            <a href="mailto:lerato@cloudsync.co.za" class="action-btn"><i class="fas fa-envelope"></i></a>
            <a href="https://wa.me/27761234567" class="action-btn"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.cloudsync.co.za" class="action-btn"><i class="fas fa-globe"></i></a>
        </div>

        <div class="info-section">
            <a href="tel:+27761234567" class="info-item">
                <div class="info-icon"><i class="fas fa-phone"></i></div>
                <div class="info-content">
                    <div class="info-label">Phone</div>
                    <div class="info-value">076 123 4567</div>
                </div>
            </a>
            <a href="mailto:lerato@cloudsync.co.za" class="info-item">
                <div class="info-icon"><i class="fas fa-envelope"></i></div>
                <div class="info-content">
                    <div class="info-label">Email</div>
                    <div class="info-value">lerato@cloudsync.co.za</div>
                </div>
            </a>
            <a href="https://maps.google.com/?q=Menlyn+Maine,+Pretoria" class="info-item">
                <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="info-content">
                    <div class="info-label">Location</div>
                    <div class="info-value">Menlyn Maine, Pretoria</div>
                </div>
            </a>
        </div>

        <div class="social-section">
            <div class="social-title">Connect</div>
            <div class="social-links">
                <a href="https://linkedin.com/in/leratomolefe" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://facebook.com/cloudsynctech" class="social-link"><i class="fab fa-facebook-f"></i></a>
                <a href="https://instagram.com/leratomolefe" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="https://twitter.com/leratomolefe" class="social-link"><i class="fab fa-x-twitter"></i></a>
            </div>
        </div>

        <a href="lerato_molefe.vcf" class="save-btn">
            <i class="fas fa-user-plus"></i>
            Save Contact
        </a>
    </div>
</body>
</html>
